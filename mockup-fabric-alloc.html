<!doctype html><html lang="ko" data-theme="retro"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>원단 배분 계산기 미리보기</title>
<link href="https://fonts.googleapis.com/css2?family=Galmuri11&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
/* ===== 테마 토큰 ===== */
:root,[data-theme="retro"]{
  --bg:#EFE8D4;--surface:#fff;--ink:#0B0A05;--t2:#3a3528;--t3:#6b6555;
  --neon-blue:#B0DBF0;--neon-green:#A5E6BA;
  --abg:#FFF9E8;--gbg:#E8F6EE;--rbg:#FEF2F2;--bbg:#EBF5FF;--bg2:#EFE8D4;
  --card-border:2.5px solid var(--ink);--card-shadow:3px 3px 0 var(--ink);
  --radius-skin:3px;
  --font-display:'Galmuri11',monospace;--font-pixel:'Press Start 2P',monospace;--font-body:-apple-system,sans-serif;
}
[data-theme="minimal"]{
  --bg:#f0eee9;--surface:#fff;--ink:#1a1a1a;--t2:#666;--t3:#999;
  --neon-blue:#E6F1FB;--neon-green:#E1F5EE;
  --abg:#fffbeb;--gbg:#f0fdf4;--rbg:#fef2f2;--bbg:#eff6ff;--bg2:#f8f7f5;
  --card-border:1px solid #e0ddd8;--card-shadow:0 1px 3px rgba(0,0,0,.06);
  --radius-skin:8px;
  --font-display:-apple-system,sans-serif;--font-pixel:-apple-system,sans-serif;--font-body:-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);background:var(--bg);padding:16px;min-height:100vh;color:var(--ink)}
input[type=number]{-moz-appearance:textfield;appearance:textfield}
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}

/* ===== 미리보기 컨트롤바 ===== */
.pbar{display:flex;gap:6px;margin-bottom:14px;align-items:center;flex-wrap:wrap}
.pbar span{font-family:var(--font-display);font-weight:700;font-size:13px;margin-right:4px}
.pbtn{font-family:var(--font-display);font-size:11px;font-weight:700;border:2px solid var(--ink);border-radius:var(--radius-skin);padding:4px 10px;cursor:pointer;background:var(--surface)}
.pbtn.on{background:var(--neon-blue)}

/* ===== ocalc 패널 (기존 스타일 복제) ===== */
.ocalc{background:var(--surface);border:var(--card-border);border-radius:var(--radius-skin);box-shadow:var(--card-shadow);overflow:hidden;margin:0 auto}
.ocalc-hd{background:var(--neon-blue);border-bottom:var(--card-border);padding:8px 11px;display:flex;align-items:center;justify-content:space-between}
.ocalc-hd .t{font-family:var(--font-display);font-weight:700;font-size:13px}
.ocalc-hd .x{font-size:11px;background:#fff;border:2px solid var(--ink);border-radius:3px;padding:3px 7px;cursor:pointer;font-family:var(--font-display)}

/* ===== 새로 추가: 탭 ===== */
.oc-tabs{display:flex;border-bottom:var(--card-border)}
.oc-tab{flex:1;padding:7px 4px;text-align:center;font-family:var(--font-display);font-size:11px;font-weight:700;cursor:pointer;border:none;background:var(--bg2);color:var(--t2);transition:background .1s}
.oc-tab.on{background:var(--surface);color:var(--ink)}
.oc-tab:first-child{border-right:var(--card-border)}

.ocalc-bd{padding:11px}

/* ===== 공통 ocalc 요소 ===== */
.fl{display:block;font-family:var(--font-display);font-weight:700;font-size:12px;margin:0 0 4px}
.fl .sub{font-size:10px;color:var(--t2);font-weight:400;font-family:var(--font-body)}
.field{margin-bottom:11px}
.szrow{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.szname{font-family:var(--font-pixel);font-size:9px;min-width:34px;text-align:center;background:var(--bg2);border:2px solid var(--ink);border-radius:3px;padding:6px 3px;white-space:nowrap}
.totinput{width:100%;font-family:var(--font-pixel);font-size:17px;text-align:center;border:2.5px solid var(--ink);border-radius:var(--radius-skin);padding:8px;background:var(--abg);font-weight:700;-webkit-appearance:none;appearance:none}
.go{width:100%;font-family:var(--font-display);font-weight:700;font-size:14px;color:var(--ink);background:var(--neon-green);border:2.5px solid var(--ink);border-radius:var(--radius-skin);box-shadow:var(--card-shadow);padding:10px;cursor:pointer;margin-top:2px}
.rgrid{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.rchip{flex:1;min-width:46px;text-align:center;background:var(--gbg);border:2px solid var(--ink);border-radius:4px;padding:7px 3px}
.rchip .s{font-family:var(--font-pixel);font-size:7px;color:var(--t2);display:block;margin-bottom:4px}
.rchip .q{font-family:var(--font-pixel);font-size:13px}
.rtot{font-family:var(--font-display);font-weight:700;font-size:13px;text-align:center;background:var(--ink);color:var(--neon-green);border-radius:var(--radius-skin);padding:8px;margin-bottom:8px}
.hint{font-size:12px;line-height:1.6;border:2px solid var(--ink);border-radius:4px;padding:8px 10px;margin-bottom:8px}
.hint.clean{background:var(--gbg)}.hint.adj{background:var(--abg)}.hint.bad{background:var(--rbg)}

/* ===== 원단 배분 탭 전용 ===== */
/* 총 원단 행 */
.fa-total{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.fa-total label{font-family:var(--font-display);font-weight:700;font-size:12px;white-space:nowrap}
.fa-total input{flex:1;font-family:var(--font-pixel);font-size:16px;text-align:center;border:2.5px solid var(--ink);border-radius:var(--radius-skin);padding:7px;background:var(--abg);font-weight:700;-webkit-appearance:none;appearance:none;min-width:0}
.fa-total .unit{font-family:var(--font-display);font-size:12px;font-weight:700;white-space:nowrap}

/* 아이템 — 카드 없이 기존 ocalc 섹션 스타일 */
.fa-card{border-top:2px dashed var(--ink);padding-top:10px;margin-bottom:10px}
.fa-card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.fa-card-nm{font-family:var(--font-display);font-weight:700;font-size:12px}
.fa-card-nm .code{font-size:9px;color:var(--t2);font-family:var(--font-pixel);margin-left:6px}
.fa-del{font-family:var(--font-display);font-size:10px;border:2px solid var(--ink);border-radius:2px;padding:2px 7px;cursor:pointer;background:#fff;color:var(--ink)}
.fa-bd{}

/* 배정 야드 행 */
.fa-assign{display:flex;align-items:center;gap:7px;margin-bottom:10px}
.fa-assign label{font-family:var(--font-display);font-weight:700;font-size:11px;white-space:nowrap;min-width:54px}
.fa-assign .yards-in{flex:1;font-family:var(--font-pixel);font-size:14px;font-weight:700;text-align:center;border:2px solid var(--ink);border-radius:var(--radius-skin);padding:6px 6px;background:var(--abg);-webkit-appearance:none;appearance:none;min-width:0}
.fa-assign .yards-in.auto{background:var(--neon-blue);border-color:var(--ink);color:var(--ink)}
.fa-assign .unit{font-family:var(--font-display);font-size:11px;font-weight:700;white-space:nowrap}
.fa-auto-btn{font-family:var(--font-display);font-size:9px;font-weight:700;border:2px solid var(--ink);border-radius:2px;padding:5px 6px;cursor:pointer;background:var(--neon-blue);white-space:nowrap}
.fa-auto-btn.on{background:var(--neon-green)}

/* 마카 + 요척 테이블 */
.fa-tbl{width:100%;border-collapse:collapse;margin-bottom:10px;font-size:11px}
.fa-tbl th{font-family:var(--font-display);font-size:10px;font-weight:700;padding:5px 4px;border-bottom:2px solid var(--ink);border-top:2px solid var(--ink);text-align:center;background:var(--bg2)}
.fa-tbl td{padding:4px 4px;border-bottom:1px solid #ddd;text-align:center;vertical-align:middle}
.fa-tbl .sz-nm{font-family:var(--font-pixel);font-size:9px;background:var(--bg2);font-weight:700}
.fa-tbl input{width:100%;font-weight:700;font-size:12px;border:2px solid var(--ink);border-radius:2px;padding:4px 3px;text-align:center;background:#fff;-webkit-appearance:none;appearance:none;min-width:0}
.fa-tbl .yo-hint{font-family:var(--font-pixel);font-size:8px;color:var(--t3);display:block;margin-top:2px}

/* 결과 패널 */
.fa-result{margin-top:8px;padding-top:9px;border-top:2px dashed var(--ink)}
.fa-marker{font-family:var(--font-display);font-weight:700;font-size:11px;text-align:center;padding:6px;background:var(--neon-green);border:2px solid var(--ink);border-radius:var(--radius-skin);margin-bottom:7px}
.fa-used{display:flex;align-items:center;justify-content:space-between;font-size:10px;margin-top:4px}
.fa-used .info{font-family:var(--font-display);color:var(--t2)}
.fa-badge{font-family:var(--font-display);font-size:9px;font-weight:700;padding:2px 7px;border-radius:3px;border:1.5px solid}
.fa-badge.ok{background:var(--gbg);border-color:#4caf50;color:#1b5e20}
.fa-badge.warn{background:var(--abg);border-color:#f59e0b;color:#78350f}

/* 아이템 검색 */
.fa-search-wrap{margin-bottom:10px}
.fa-search-in{width:100%;font-family:var(--font-display);font-size:13px;font-weight:600;border:2px solid var(--ink);border-radius:var(--radius-skin);padding:7px 9px;background:#fff;-webkit-appearance:none;appearance:none}
.fa-search-hint{font-family:var(--font-display);font-size:10px;color:var(--t2);margin-top:4px;min-height:14px}

/* 남은 원단 footer */
.fa-footer{padding-top:10px;border-top:2px solid var(--ink)}
.fa-rem{font-family:var(--font-pixel);font-size:12px;text-align:center;padding:9px;border:2px solid var(--ink);border-radius:var(--radius-skin)}
.fa-rem.ok{background:var(--gbg)}
.fa-rem.over{background:var(--rbg)}
.fa-rem.much{background:var(--abg)}
.fa-rem-detail{font-family:var(--font-display);font-size:10px;text-align:center;color:var(--t2);margin-top:5px}
</style>
</head>
<body>

<!-- 미리보기 컨트롤 -->
<div class="pbar">
  <span>원단 배분 계산기</span>
  <button class="pbtn" onclick="toggleTheme()">테마 전환</button>
  <button class="pbtn on" id="btn-ph" onclick="setMode('ph')">폰 390px</button>
  <button class="pbtn" id="btn-dt" onclick="setMode('dt')">데스크탑</button>
</div>

<!-- 미리보기 영역 -->
<div id="wrap" style="max-width:390px">
<div class="ocalc">

  <!-- 헤더 -->
  <div class="ocalc-hd">
    <span class="t">오더수량 배수 계산기</span>
    <span class="x">✕ 닫기</span>
  </div>

  <!-- 탭 (신규) -->
  <div class="oc-tabs">
    <button class="oc-tab" onclick="switchTab('qty')">수량 계산</button>
    <button class="oc-tab on" onclick="switchTab('fab')">원단 배분</button>
  </div>

  <!-- 수량 계산 탭 (기존) -->
  <div id="t-qty" class="ocalc-bd" style="display:none">
    <p style="font-family:var(--font-display);font-size:12px;color:var(--t2);text-align:center;padding:24px 0 20px">기존 수량 배수 계산기<br><span style="font-size:10px">(탭 추가 외 변경 없음)</span></p>
  </div>

  <!-- 원단 배분 탭 (신규) -->
  <div id="t-fab" class="ocalc-bd">

    <!-- 총 원단 입력 -->
    <div class="fa-total">
      <label>총 원단</label>
      <input type="number" id="total-yd" value="150" inputmode="decimal" step="0.5" oninput="recalc()">
      <span class="unit">야드</span>
    </div>

    <!-- 아이템 추가 — 기존 수량계산기와 동일한 검색 datalist 패턴 -->
    <div class="fa-search-wrap" id="fa-search-wrap">
      <label class="fl">아이템 추가 <span class="sub">아이템명·품번 검색 후 선택하면 자동 불러오기</span></label>
      <div style="display:flex;gap:6px">
        <input class="fa-search-in" id="fa-search" list="fa-dl" placeholder="아이템명·품번 검색..." autocomplete="off" oninput="onSearchInput()">
        <datalist id="fa-dl">
          <option value="티셔츠 · AR-T001"></option>
          <option value="바디수트 · AR-B002"></option>
          <option value="후드집업 · AR-H003"></option>
          <option value="슬랙스 · AR-P004"></option>
        </datalist>
      </div>
      <div class="fa-search-hint" id="fa-search-hint"></div>
    </div>

    <!-- 아이템 카드 목록 -->
    <div id="fa-list"></div>

    <!-- 남은 원단 합계 -->
    <div class="fa-footer">
      <div class="fa-rem ok" id="fa-rem">남은 원단 계산 중...</div>
      <div class="fa-rem-detail" id="fa-rem-detail"></div>
    </div>

  </div>
</div>
</div><!-- /wrap -->

<script>
/* ===== 테마 / 뷰 모드 ===== */
function toggleTheme(){
  var h=document.documentElement;
  h.dataset.theme=h.dataset.theme==='retro'?'minimal':'retro';
}
function setMode(m){
  document.getElementById('wrap').style.maxWidth=m==='ph'?'390px':'680px';
  document.getElementById('btn-ph').className='pbtn'+(m==='ph'?' on':'');
  document.getElementById('btn-dt').className='pbtn'+(m==='dt'?' on':'');
}
function switchTab(t){
  document.getElementById('t-qty').style.display=t==='qty'?'':'none';
  document.getElementById('t-fab').style.display=t==='fab'?'':'none';
  document.querySelectorAll('.oc-tab').forEach(function(el,i){
    el.className='oc-tab'+((t==='qty'?i===0:i===1)?' on':'');
  });
}

/* ===== 데이터 ===== */
var items=[];
var nid=1;

// 발주서 아이템 풀 (실제 앱에선 S.items에서 자동 생성)
var pool={
  'AR-T001':{name:'티셔츠',code:'AR-T001',sizes:[{name:'S',yocheok:0.45,ratio:1},{name:'M',yocheok:0.50,ratio:2},{name:'L',yocheok:0.55,ratio:2}]},
  'AR-B002':{name:'바디수트',code:'AR-B002',sizes:[{name:'S',yocheok:0.30,ratio:1},{name:'M',yocheok:0.33,ratio:2},{name:'L',yocheok:0.36,ratio:1}]},
  'AR-H003':{name:'후드집업',code:'AR-H003',sizes:[{name:'S',yocheok:0.68,ratio:1},{name:'M',yocheok:0.73,ratio:2},{name:'L',yocheok:0.78,ratio:1}]},
  'AR-P004':{name:'슬랙스',code:'AR-P004',sizes:[{name:'S',yocheok:0.55,ratio:1},{name:'M',yocheok:0.60,ratio:2},{name:'L',yocheok:0.65,ratio:2},{name:'XL',yocheok:0.70,ratio:1}]},
};

function onSearchInput(){
  var q=(document.getElementById('fa-search').value||'').trim();
  var hint=document.getElementById('fa-search-hint');
  if(!q){hint.textContent='';return;}
  // datalist에서 정확히 일치하는 항목 찾기
  var matched=null;
  Object.values(pool).forEach(function(it){
    var label=it.name+' · '+it.code;
    if(label===q) matched=it;
  });
  // 부분일치 폴백
  if(!matched){
    var ql=q.toLowerCase();
    var hits=Object.values(pool).filter(function(it){
      return it.name.toLowerCase().indexOf(ql)>=0||it.code.toLowerCase().indexOf(ql)>=0;
    });
    if(hits.length===1) matched=hits[0];
  }
  if(matched){
    // 이미 추가됐는지 확인
    var exists=items.find(function(x){return x.code===matched.code;});
    if(exists){hint.textContent='이미 추가된 아이템이에요';return;}
    addItemFromPool(matched);
    document.getElementById('fa-search').value='';
    hint.textContent='';
  } else {
    hint.textContent=q.length>1?'검색 결과: 아이템 고르면 자동 추가돼요':'';
  }
}

function addItemFromPool(src){
  items.push({
    id:nid++,name:src.name,code:src.code,
    sizes:src.sizes.map(function(sz){return Object.assign({},sz);}),
    assignedYd:0,auto:false
  });
  renderAll();recalc();
}

/* ===== 계산 ===== */
function calcItem(item, yd){
  var myd=0; // 마카당 야드
  item.sizes.forEach(function(sz){
    myd+=(parseFloat(sz.yocheok)||0)*(parseInt(sz.ratio)||0);
  });
  myd=+myd.toFixed(4);
  var cnt=myd>0?Math.floor(yd/myd):0;
  var used=+(cnt*myd).toFixed(2);
  var left=+(yd-used).toFixed(2);
  var szQtys=item.sizes.map(function(sz){
    return {name:sz.name,qty:cnt*(parseInt(sz.ratio)||0)};
  });
  var totalQty=szQtys.reduce(function(a,s){return a+s.qty;},0);
  return {cnt:cnt,myd:myd,used:used,left:left,szQtys:szQtys,totalQty:totalQty};
}

function recalc(){
  var totalYd=parseFloat(document.getElementById('total-yd').value)||0;

  // 자동 아이템의 배정 야드 = 총원단 - 나머지 합
  var fixedSum=0;
  items.forEach(function(it){
    if(!it.auto) fixedSum+=parseFloat(document.getElementById('fa-yd-'+it.id)?.value)||0;
  });
  var autoYd=Math.max(0,+(totalYd-fixedSum).toFixed(2));

  var totalUsed=0,totalQty=0;
  items.forEach(function(it){
    var yd=it.auto?autoYd:(parseFloat(document.getElementById('fa-yd-'+it.id)?.value)||0);
    if(it.auto){
      var el=document.getElementById('fa-yd-'+it.id);
      if(el) el.value=autoYd;
    }
    var r=calcItem(it,yd);
    totalUsed+=r.used;
    totalQty+=r.totalQty;
    renderResult(it.id,r);
  });

  // 남은 원단
  var rem=+(totalYd-totalUsed).toFixed(2);
  var remEl=document.getElementById('fa-rem');
  var detEl=document.getElementById('fa-rem-detail');
  if(rem<=0.3){
    remEl.className='fa-rem ok';
    remEl.textContent='남은 원단 '+rem+'yd  (완전 소진)';
  } else if(rem>8){
    remEl.className='fa-rem much';
    remEl.textContent='남은 원단 '+rem+'yd  (많이 남아요)';
  } else {
    remEl.className='fa-rem ok';
    remEl.textContent='남은 원단 '+rem+'yd';
  }
  detEl.textContent='총 사용 '+(+totalUsed.toFixed(2))+'yd  ·  전체 '+totalQty+'장';
}

function renderResult(id,r){
  var el=document.getElementById('fa-res-'+id);
  if(!el)return;
  var chips=r.szQtys.map(function(s){
    return '<div class="rchip"><span class="s">'+s.name+'</span><span class="q">'+s.qty+'</span></div>';
  }).join('');
  var leftClass=r.left<=0.3?'ok':'warn';
  el.innerHTML=
    '<div class="fa-marker">마카 '+r.cnt+'회  &middot;  총 '+r.totalQty+'장</div>'
    +'<div class="rgrid">'+chips+'</div>'
    +'<div class="fa-used">'
    +'<span class="info">마카당 '+r.myd+'yd  &middot;  사용 '+r.used+'yd</span>'
    +'<span class="fa-badge '+leftClass+'">잔여 '+r.left+'yd</span>'
    +'</div>';
}

/* ===== 렌더 ===== */
function renderAll(){
  var html=items.map(renderCard).join('');
  document.getElementById('fa-list').innerHTML=html;
}

function renderCard(it){
  var szRows=it.sizes.map(function(sz,i){
    return '<tr>'
      +'<td class="sz-nm">'+sz.name+'</td>'
      +'<td><input type="number" inputmode="decimal" value="'+sz.yocheok+'" step="0.01" min="0" oninput="updYo('+it.id+','+i+',this.value)" title="요척 (야드/장) — 발주서에서 자동 불러옴">'
      +'<span class="yo-hint">요척(yd)</span></td>'
      +'<td><input type="number" inputmode="numeric" value="'+sz.ratio+'" step="1" min="0" oninput="updRatio('+it.id+','+i+',this.value)" title="마카 구성 비율 — S:1 M:2 L:2 형태로 입력"></td>'
      +'</tr>';
  }).join('');

  return '<div class="fa-card" id="fa-card-'+it.id+'">'
    +'<div class="fa-card-hd">'
    +'<span class="fa-card-nm">'+it.name+'<span class="code">'+it.code+'</span></span>'
    +'<button class="fa-del" onclick="removeItem('+it.id+')">삭제</button>'
    +'</div>'
    +'<div class="fa-bd">'

    // 배정 야드
    +'<div class="fa-assign">'
    +'<label>배정 야드</label>'
    +'<input type="number" id="fa-yd-'+it.id+'" inputmode="decimal" step="0.5" min="0"'
    +' class="yards-in'+(it.auto?' auto':'')+'"'
    +(it.auto?' readonly placeholder="자동"':' value="'+it.assignedYd+'"')
    +' oninput="recalc()">'
    +'<span class="unit">yd</span>'
    +'<button class="fa-auto-btn'+(it.auto?' on':'')+'" onclick="toggleAuto('+it.id+')">'
    +(it.auto?'자동 ON':'자동')
    +'</button>'
    +'</div>'

    // 사이즈별 요척 + 마카 비율
    +'<table class="fa-tbl">'
    +'<thead><tr><th>사이즈</th><th>요척(yd) <span style="font-weight:400;color:var(--t3)">발주서</span></th><th>마카비율</th></tr></thead>'
    +'<tbody>'+szRows+'</tbody>'
    +'</table>'

    // 결과
    +'<div class="fa-result" id="fa-res-'+it.id+'"></div>'
    +'</div>'
    +'</div>';
}

function updYo(id,i,v){
  var it=items.find(function(x){return x.id===id;});
  if(it){it.sizes[i].yocheok=parseFloat(v)||0;recalc();}
}
function updRatio(id,i,v){
  var it=items.find(function(x){return x.id===id;});
  if(it){it.sizes[i].ratio=parseInt(v)||0;recalc();}
}
function toggleAuto(id){
  var it=items.find(function(x){return x.id===id;});
  if(!it)return;
  it.auto=!it.auto;
  if(it.auto){
    // 하나만 자동
    items.forEach(function(x){if(x.id!==id)x.auto=false;});
  }
  renderAll();recalc();
}
function removeItem(id){
  items=items.filter(function(x){return x.id!==id;});
  renderAll();recalc();
}
function addItem(){
  if(poolIdx>=pool.length){
    alert('미리보기 샘플 아이템이 더 없어요.\n(실제 앱에서는 발주서 전체 아이템에서 선택)');
    return;
  }
  var s=pool[poolIdx++];
  items.push({
    id:nid++,name:s.name,code:s.code,
    sizes:s.sizes.map(function(sz){return Object.assign({},sz);}),
    assignedYd:0,auto:false
  });
  renderAll();recalc();
}

/* ===== 초기화 ===== */
renderAll();
recalc();
</script>
</body></html>

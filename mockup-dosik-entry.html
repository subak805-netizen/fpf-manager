<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>도식화 입구 미리보기</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  :root{ --bg:#f0eee9; --card:#fff; --bd:#e7e3dc; --line:#efece6; --text:#23211e; --t2:#6b6760; --t3:#a6a199; --accent:#185FA5; --accent-bg:#eef5fc; --accent-bd:#cfe0f3; }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'Pretendard',-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
  .nav{display:flex;gap:4px;align-items:center;padding:10px 16px;background:var(--card);border-bottom:1px solid var(--bd);overflow:auto}
  .np{padding:7px 13px;border-radius:9px;font-size:13.5px;color:var(--t2);cursor:pointer;white-space:nowrap;position:relative}
  .np:hover{background:#f3f1ec}
  .np.on{background:var(--accent-bg);color:var(--accent);font-weight:600}
  .np .new{position:absolute;top:-3px;right:-3px;font-size:9px;background:#e24b4a;color:#fff;border-radius:6px;padding:0 4px}
  .wrap{max-width:780px;margin:18px auto;padding:0 14px 60px}
  .hint{font-size:13px;color:var(--t2);background:#fff;border:1px solid var(--bd);border-radius:10px;padding:11px 14px;margin-bottom:14px;line-height:1.6}
  .hint b{color:var(--accent)}
  /* 아이템 행 */
  .it{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:13px 15px;margin-bottom:10px;display:flex;align-items:center;gap:12px}
  .it .thumb{width:46px;height:46px;border-radius:8px;background:#f3f1ec;border:1px solid var(--line);flex:0 0 46px;overflow:hidden;display:flex;align-items:center;justify-content:center;color:var(--t3);font-size:18px}
  .it .thumb img{width:100%;height:100%;object-fit:contain}
  .it .info{flex:1;min-width:0}
  .it .nm{font-size:14px;font-weight:600}
  .it .sub{font-size:12px;color:var(--t2);margin-top:2px}
  .it .acts{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
  .b{height:32px;padding:0 11px;border:1px solid var(--bd);background:#fff;border-radius:8px;font-size:12.5px;font-family:inherit;color:var(--text);cursor:pointer;display:inline-flex;align-items:center;gap:5px}
  .b:hover{background:#f5f3ef}
  .b.draw{color:var(--accent);border-color:var(--accent-bd);background:var(--accent-bg);font-weight:500}
  /* 도식화 보드(탭) */
  .board{display:none;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
  .board.show{display:grid}
  .list.hide{display:none}
  .bc{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:12px;text-align:center}
  .bc .pv{height:110px;border:1px solid var(--line);border-radius:8px;background:#fbfaf8;display:flex;align-items:center;justify-content:center;color:var(--t3);font-size:13px;overflow:hidden;margin-bottom:9px}
  .bc .pv img{max-width:100%;max-height:100%;object-fit:contain}
  .bc .nm{font-size:13px;font-weight:600;margin-bottom:8px}
  .bc .b{width:100%;justify-content:center}
  .sech{font-size:13px;font-weight:600;color:var(--t2);margin:4px 0 10px}
  /* modal */
  .modal{position:fixed;inset:0;background:rgba(20,18,16,.5);display:none;z-index:100;flex-direction:column}
  .modal.open{display:flex}
  .mb{height:52px;background:#fff;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px;padding:0 14px;flex:0 0 52px}
  .mb .t{font-size:14px;font-weight:600;flex:1}
  .mb button{height:36px;border-radius:9px;font-size:13px;font-family:inherit;cursor:pointer}
  .mb .x{padding:0 12px;border:1px solid var(--bd);background:#fff}
  .mb .save{padding:0 16px;border:1px solid var(--accent);background:var(--accent);color:#fff;font-weight:500}
  .mbody{flex:1;background:#fff}
  .mbody iframe{width:100%;height:100%;border:0;display:block}
  .toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:rgba(28,26,23,.9);color:#fff;font-size:13px;padding:10px 18px;border-radius:999px;opacity:0;transition:opacity .2s;z-index:200}
  .toast.show{opacity:1}
</style>
</head>
<body>
  <div class="nav">
    <div class="np">진행</div><div class="np">할일</div><div class="np">동선</div>
    <div class="np" id="np-item">아이템</div>
    <div class="np" id="np-dosik">도식화<span class="new">NEW</span></div>
    <div class="np">불량관리</div><div class="np">분석</div><div class="np">업체관리</div>
  </div>

  <div class="wrap">
    <div class="hint">도식화 <b>입구 2곳</b> — ① 아이템 목록의 각 품번에 <b>🎨 도식화</b> 버튼, ② 상단 메뉴 <b>도식화</b> 탭에서 모아보기. 어디로 들어가든 <b>같은 도식화 작업실</b>이 떠요. 작업지시서엔 결과만 자동으로 보여요(읽기 전용).</div>

    <!-- 아이템 목록 -->
    <div class="list" id="list">
      <div class="sech">아이템 목록</div>
      <div id="rows"></div>
    </div>

    <!-- 도식화 보드(탭) -->
    <div class="board" id="board">
      <!-- 채워짐 -->
    </div>
  </div>

  <div class="modal" id="modal">
    <div class="mb"><div class="t" id="mtitle">✏️ 도식화</div>
      <button class="x" onclick="closeM()">닫기</button>
      <button class="save" onclick="saveM()">✓ 저장</button>
    </div>
    <div class="mbody"><iframe id="frame" title="도식화"></iframe></div>
  </div>
  <div class="toast" id="toast"></div>

<script>
const items=[
  {id:'AR-2401',nm:'스트라이프 기본 셔츠',sub:'아루드 · 26 S/S · 봉제 아이케이',img:null},
  {id:'AR-2402',nm:'아동 긴팔 상의',sub:'아루드 · 26 S/S · 봉제 엄지',img:null},
  {id:'TF-1107',nm:'와이드 팬츠',sub:'더프루토 · 26 S/S · 봉제 넘버파이브',img:null},
];
let cur=null;
function rowsHTML(){
  return items.map(it=>'<div class="it"><div class="thumb">'+(it.img?'<img src="'+it.img+'">':'👕')+'</div>'
    +'<div class="info"><div class="nm">'+it.nm+'</div><div class="sub">'+it.id+' · '+it.sub+'</div></div>'
    +'<div class="acts"><button class="b">수정</button><button class="b">💰 원가</button><button class="b">📋 작지</button>'
    +'<button class="b draw" onclick="openM(\''+it.id+'\')">🎨 도식화</button></div></div>').join('');
}
function boardHTML(){
  return items.map(it=>'<div class="bc"><div class="pv">'+(it.img?'<img src="'+it.img+'">':'도식화 없음')+'</div>'
    +'<div class="nm">'+it.nm+'</div><button class="b draw" onclick="openM(\''+it.id+'\')">🎨 그리기</button></div>').join('');
}
function render(){ document.getElementById('rows').innerHTML=rowsHTML(); document.getElementById('board').innerHTML=boardHTML(); }
function showItem(){ document.getElementById('list').classList.remove('hide'); document.getElementById('board').classList.remove('show'); document.getElementById('np-item').classList.add('on'); document.getElementById('np-dosik').classList.remove('on'); }
function showBoard(){ document.getElementById('list').classList.add('hide'); document.getElementById('board').classList.add('show'); document.getElementById('np-dosik').classList.add('on'); document.getElementById('np-item').classList.remove('on'); }
document.getElementById('np-item').onclick=showItem;
document.getElementById('np-dosik').onclick=showBoard;
function openM(id){ cur=id; var it=items.find(x=>x.id===id); document.getElementById('mtitle').textContent='🎨 도식화 · '+it.nm+' ('+id+')'; var f=document.getElementById('frame'); if(!f.src)f.src='mockup-techsketch.html'; document.getElementById('modal').classList.add('open'); }
function closeM(){ document.getElementById('modal').classList.remove('open'); }
function saveM(){ var f=document.getElementById('frame'); try{ var png=f.contentWindow.exportPNG(); var it=items.find(x=>x.id===cur); it.img=png; render(); closeM(); toast('"'+it.id+'"에 도식화 저장됨 ✓ (작지에도 자동 표시)'); }catch(e){ toast('도식화 로딩 중이에요. 잠시 후 다시.'); } }
function toast(m){ var t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }
render(); showItem();
</script>
</body>
</html>

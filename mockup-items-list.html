<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>아이템 리스트 — 미리보기 (카드 박스형)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
@font-face{font-family:'Galmuri11';src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/2403-3@1.0/Galmuri11.woff2') format('woff2');font-display:swap;}
:root{
  --ink:#0B0A05; --neon-green:#A5E6BA; --neon-blue:#B0DBF0;
  --ivory:#FBF8EF; --paper:#FFFFFF;
  --t1:#111; --t2:#6b7280; --t3:#9ca3af;
}
*{box-sizing:border-box;}
body{margin:0;background:#EDEAE0;font-family:'Pretendard','Pretendard Variable',-apple-system,system-ui,sans-serif;color:var(--t1);padding:18px 12px 60px;letter-spacing:-0.2px;}
.wrap{max-width:980px;margin:0 auto;}
.note{font-size:13px;color:#111;font-weight:700;margin:0 0 16px;line-height:1.6;}
.note span{font-weight:400;color:#6b7280;font-size:12px;}
.hdr-bar{font-family:'Galmuri11','Pretendard',sans-serif;font-size:13px;font-weight:700;background:var(--ink);color:#fff;padding:9px 14px;border:2.5px solid var(--ink);box-shadow:3px 3px 0 rgba(0,0,0,.25);display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.hdr-bar .cnt{font-family:'Press Start 2P',monospace;font-size:9px;color:var(--neon-green);}

/* 시즌 그룹 헤더 */
.season-h{font-family:'Press Start 2P',monospace;font-size:11px;color:var(--ink);background:var(--neon-green);border:2.5px solid var(--ink);box-shadow:2px 2px 0 var(--ink);display:inline-block;padding:6px 11px;margin:18px 0 11px;}
.season-h:first-of-type{margin-top:4px;}

/* ===== 카드 박스형 행 ===== */
.im-row{display:grid;grid-template-columns:92px 1fr 168px;gap:14px;align-items:center;
  background:var(--paper);border:2.5px solid var(--ink);box-shadow:3px 3px 0 rgba(11,10,5,.18);
  padding:13px 14px;margin-bottom:11px;transition:transform .1s,box-shadow .1s;}
.im-row:hover{transform:translate(-1px,-1px);box-shadow:4px 6px 0 var(--neon-green);}

/* 좌측: 시즌(크게) + 품번 */
.im-head{display:flex;flex-direction:column;gap:3px;line-height:1;}
.im-season{font-family:'Press Start 2P',monospace;font-size:13px;font-weight:700;color:var(--ink);letter-spacing:0;}
.im-season.blank{color:#cbd0d8;}
.im-code{font-family:'Press Start 2P',monospace;font-size:9px;color:#7a8290;letter-spacing:0;}
.im-code.blank{color:#cbd0d8;}

.im-info{min-width:0;}
.im-name{font-size:14px;font-weight:800;color:#111;margin-bottom:4px;letter-spacing:-0.3px;line-height:1.3;}
.im-name .im-brand{color:#6b7280;font-weight:600;font-size:11.5px;margin-right:6px;}
.im-line{font-size:12px;color:#374151;line-height:1.55;display:flex;flex-wrap:wrap;align-items:baseline;}
.im-line>span{display:inline-flex;align-items:baseline;}
.im-sep{color:#cbd0d8;margin:0 7px;}
.im-lbl{color:#9ca3af;margin-right:4px;}
.im-labor{display:inline-flex;align-items:center;gap:2px;}
.im-labor-in{width:78px;font-size:12px;padding:2px 6px;border:1.5px solid var(--ink);border-radius:3px;text-align:right;background:#fff;color:#111;font-weight:700;margin:0 3px;font-variant-numeric:tabular-nums;}
.im-labor-in.miss{border-color:#fecaca;background:#fef2f2;color:#b91c1c;}

.im-actions{display:flex;align-items:center;justify-content:flex-end;gap:5px;flex-shrink:0;flex-wrap:wrap;}
.im-stat{font-family:'Press Start 2P',monospace;font-size:8px;color:#7a8290;white-space:nowrap;width:100%;text-align:right;margin-bottom:3px;}
.im-btn{min-width:44px;height:28px;padding:0 9px;display:inline-flex;align-items:center;justify-content:center;background:#fff;border:1.5px solid var(--ink);color:#333;border-radius:3px;cursor:pointer;font-size:11.5px;font-weight:700;font-family:inherit;box-shadow:2px 2px 0 var(--ink);transition:transform .08s,box-shadow .08s,background .08s;}
.im-btn:active{transform:translate(2px,2px);box-shadow:0 0 0 var(--ink);}
.im-btn:hover{background:var(--neon-blue);}
.im-btn.danger:hover{background:#fecaca;}

@media(max-width:720px){
  .im-row{grid-template-columns:78px 1fr;row-gap:8px;}
  .im-actions{grid-column:1 / -1;justify-content:flex-start;padding-top:2px;}
  .im-stat{text-align:left;}
}
</style>
</head>
<body>
<div class="wrap">
  <p class="note">아이템 리스트 — 카드 박스형 (수정안)<br>
  <span>시즌을 품번 앞에 크게 + 시즌별 정렬, 줄 순서 = 원단처·색상·사이즈·봉제·공임, 규격(혼용률) 제거. 나머지 그대로. 확인 후 index.html에 반영할게요 😊</span></p>

  <div class="hdr-bar">🧾 아이템 <span class="cnt">71/71개</span></div>
  <div id="list"></div>
</div>

<script>
const ITEMS=[
  {code:'AR01',season:'26SS',brand:'아루드',name:'호타데님(블루데님)',fabSup:'대운텍스타일',color:'데님',size:'S / M / L',sew:'넘버파이브',labor:29000,fab:0,trim:2},
  {code:'AR02',season:'26SS',brand:'아루드',name:'메르시팬츠 카키(르메르팬츠)',fabSup:'한솔섬유',color:'카키',size:'S / M / L',sew:'넘버파이브',labor:37500,fab:0,trim:2},
  {code:'AR02',season:'26SS',brand:'아루드',name:'메르시팬츠 아이 (르메르팬츠)',fabSup:'한솔섬유',color:'아이',size:'S / M / L',sew:'넘버파이브',labor:32500,fab:0,trim:2},
  {code:'AR06',season:'26SS',brand:'아루드',name:'모흐스커트(H라인SK)',fabSup:'다우리',color:'곤색',size:'S / M / L',sew:'아이케이',labor:22000,fab:1,trim:5},
  {code:'AR08',season:'26SS',brand:'아루드',name:'새틴배색팬츠',fabSup:'다우리',color:'검정',size:'1 / 2',sew:'아이케이',labor:25000,fab:3,trim:9},
  {code:'AR10',season:'26SS',brand:'아루드',name:'레이스집업',fabSup:'',color:'',size:'',sew:'투케이',labor:0,fab:0,trim:0},
  {code:'AR11',season:'26SS',brand:'아루드',name:'벌룬데님팬츠',fabSup:'대운텍스타일',color:'데님',size:'S / M / L',sew:'포르뚜나',labor:18500,fab:1,trim:6},
  {code:'AR20',season:'26SS',brand:'아루드',name:'벌룬카고팬츠',fabSup:'다우리',color:'아이 / 블랙',size:'S / M / L',sew:'아이케이',labor:31000,fab:1,trim:8,care:'드라이클리닝 온리'},
  {code:'TF03',season:'25FW',brand:'더프루토',name:'울混 더블코트',fabSup:'금성모직',color:'카멜 / 차콜',size:'S / M / L',sew:'블루베리',labor:68000,fab:2,trim:7},
  {code:'TF07',season:'25FW',brand:'더프루토',name:'코듀로이 와이드팬츠',fabSup:'한솔섬유',color:'베이지 / 브라운',size:'S / M / L',sew:'아이케이',labor:24000,fab:1,trim:5},
  {code:'LB02',season:'25FW',brand:'리틀그로브',name:'기모 후드집업',fabSup:'대운텍스타일',color:'그레이 / 핑크',size:'XS / S / M',sew:'넘버파이브',labor:21000,fab:1,trim:4},
];
function seasonRank(s){
  // 같은 시즌끼리 묶고, 최신 시즌이 위로 (예: 26SS > 25FW > 25SS)
  if(!s)return -1;
  const m=s.match(/(\d{2}).*?(SS|FW|F\/W|S\/S|FALL|SPRING)?/i);
  const yr=m?parseInt(m[1],10):0;
  const seasonStr=(s.toUpperCase());
  const half=/FW|F\/W|FALL|가을|겨울|F$/.test(seasonStr)?1:0; // FW가 SS보다 늦음
  return yr*10+half;
}
const sorted=[...ITEMS].sort((a,b)=>{
  const ra=seasonRank(a.season), rb=seasonRank(b.season);
  if(ra!==rb)return rb-ra;                 // 시즌 최신 먼저
  return (a.code||'￿').localeCompare(b.code||'￿','ko',{numeric:true});
});
function rowHTML(it){
  const parts=[];
  if(it.fabSup)parts.push('<span><span class="im-lbl">원단처</span>'+it.fabSup+'</span>');
  if(it.color)parts.push('<span><span class="im-lbl">색상</span>'+it.color+'</span>');
  if(it.size)parts.push('<span><span class="im-lbl">사이즈</span>'+it.size+'</span>');
  if(it.sew)parts.push('<span><span class="im-lbl">봉제</span>'+it.sew+'</span>');
  parts.push('<span class="im-labor"><span class="im-lbl">공임</span><input class="im-labor-in'+(it.labor?'':' miss')+'" value="'+(it.labor||'')+'" placeholder="미입력">원</span>');
  if(it.care)parts.push('<span><span class="im-lbl">취급</span>'+it.care+'</span>');
  const info=parts.join('<span class="im-sep">·</span>');
  return '<div class="im-row">'
    +'<div class="im-head"><span class="im-season'+(it.season?'':' blank')+'">'+(it.season||'—')+'</span>'
      +'<span class="im-code'+(it.code?'':' blank')+'">'+(it.code||'—')+'</span></div>'
    +'<div class="im-info"><div class="im-name"><span class="im-brand">'+it.brand+'</span>'+it.name+'</div><div class="im-line">'+info+'</div></div>'
    +'<div class="im-actions">'
      +'<span class="im-stat">원단 '+it.fab+' · 부자재 '+it.trim+'</span>'
      +'<button class="im-btn">수정</button>'
      +'<button class="im-btn">원가</button>'
      +'<button class="im-btn">복제</button>'
      +'<button class="im-btn danger">삭제</button>'
    +'</div></div>';
}
// 시즌 그룹 헤더와 함께 렌더
let html='', curSeason='\0';
sorted.forEach(it=>{
  const s=it.season||'시즌 미지정';
  if(s!==curSeason){curSeason=s;html+='<div class="season-h">'+s+'</div>';}
  html+=rowHTML(it);
});
document.getElementById('list').innerHTML=html;
</script>
</body>
</html>

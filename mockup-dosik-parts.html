<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>도식화 기본 부품 미리보기</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  body{margin:0;background:#f0eee9;color:#23211e;font-family:'Pretendard',sans-serif;padding:22px}
  h1{font-size:19px;margin:0 0 4px}
  .sub{font-size:13px;color:#6b6760;margin:0 0 20px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;max-width:1000px}
  .card{background:#fff;border:1px solid #e7e3dc;border-radius:12px;padding:10px;text-align:center;box-shadow:0 1px 2px rgba(40,36,30,.05)}
  .card svg{width:100%;height:110px;display:block}
  .card .nm{font-size:12.5px;font-weight:600;margin-top:6px}
  .card .ct{font-size:10.5px;color:#a6a199}
  svg path,svg line,svg circle,svg rect,svg polyline{fill:none;stroke:#1a1a1a;stroke-width:2;stroke-linejoin:round;stroke-linecap:round;vector-effect:non-scaling-stroke}
</style>
</head>
<body>
<h1>🧩 도식화 기본 부품 (미리보기)</h1>
<p class="sub">이 도형들을 "기호·부품 스탬프 → 부품"에 미리 넣어두면, 클릭만으로 찍어 쓸 수 있어요. 모양 괜찮은지 봐주세요 (어색한 건 다듬어요).</p>
<div class="grid" id="g"></div>
<script>
const PARTS=[
 {c:'포켓',n:'사각 패치',svg:'<path d="M22 30 H78 V80 H22 Z"/><path d="M22 38 H78"/>'},
 {c:'포켓',n:'둥근 패치',svg:'<path d="M22 30 H78 V62 Q78 80 60 80 H40 Q22 80 22 62 Z"/><path d="M22 38 H78"/>'},
 {c:'포켓',n:'사선 주머니',svg:'<path d="M24 78 V42 C24 34 30 32 40 32 H78 V78 Z"/><path d="M24 50 C42 60 62 58 78 44"/>'},
 {c:'포켓',n:'뒷 웰트포켓',svg:'<path d="M28 48 H72"/><path d="M28 58 H72"/><path d="M28 48 V58"/><path d="M72 48 V58"/><path d="M34 58 L30 64"/><path d="M66 58 L70 64"/>'},
 {c:'카라',n:'셔츠 카라',svg:'<path d="M50 26 L24 34 L33 56 L50 44 Z"/><path d="M50 26 L76 34 L67 56 L50 44 Z"/><path d="M33 40 Q50 34 67 40"/>'},
 {c:'카라',n:'라운드(피터팬)',svg:'<path d="M50 30 C30 30 24 48 36 58 C43 52 48 47 50 44"/><path d="M50 30 C70 30 76 48 64 58 C57 52 52 47 50 44"/>'},
 {c:'카라',n:'밴드(스탠드)',svg:'<path d="M24 52 Q50 40 76 52 L76 62 Q50 50 24 62 Z"/>'},
 {c:'부속',n:'지퍼',svg:'<path d="M50 24 V82"/><path d="M40 32 H46 M54 32 H60 M40 40 H46 M54 40 H60 M40 48 H46 M54 48 H60 M40 56 H46 M54 56 H60 M40 64 H46 M54 64 H60 M40 72 H46 M54 72 H60"/><rect x="45" y="20" width="10" height="8" rx="2"/>'},
 {c:'부속',n:'단작(플래킷)',svg:'<path d="M40 24 V82"/><path d="M60 24 V82"/><circle cx="50" cy="36" r="2.4"/><circle cx="50" cy="54" r="2.4"/><circle cx="50" cy="72" r="2.4"/>'},
 {c:'부속',n:'커프스',svg:'<path d="M24 42 H76 V70 H24 Z"/><path d="M62 56 H70"/><circle cx="34" cy="56" r="2.4"/>'},
 {c:'부속',n:'고무밴드 셔링단',svg:'<path d="M20 44 H80"/><path d="M20 64 H80"/><path d="M28 44 Q26 54 28 64 M40 44 Q38 54 40 64 M52 44 Q50 54 52 64 M64 44 Q62 54 64 64 M74 44 Q72 54 74 64"/>'},
 {c:'표시',n:'다트',svg:'<path d="M50 26 L45 56 L50 80 L55 56 Z"/>'},
 {c:'표시',n:'벨트고리',svg:'<path d="M44 34 H56 V74 H44 Z"/><path d="M40 34 H60 M40 74 H60"/>'},
 {c:'표시',n:'후드 끈구멍',svg:'<circle cx="40" cy="52" r="5"/><circle cx="60" cy="52" r="5"/><path d="M30 40 H70 V64 H30 Z"/>'}
];
document.getElementById('g').innerHTML=PARTS.map(p=>'<div class="card"><svg viewBox="0 0 100 100">'+p.svg+'</svg><div class="nm">'+p.n+'</div><div class="ct">'+p.c+'</div></div>').join('');
</script>
</body>
</html>

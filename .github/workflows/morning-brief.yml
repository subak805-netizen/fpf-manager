name: morning-brief
# FPF 아침 브리핑 — 목표 도착 09:30 KST. 깃허브 예약은 1~2시간 늦게 도는 게 일상이라(실측 84~113분 지연)
# 08:00 KST(23:00 UTC)에 걸어 실제 발송이 9시 반 언저리에 오도록 보정. 정확한 시각은 깃허브 사정에 따라 ±30분 오차.
# 필요한 Secrets: FIREBASE_SERVICE_ACCOUNT / TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID (등록 완료 2026-07-06)
# Secrets 없으면 발송을 조용히 건너뜀(실패 아님).
on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch: {}
jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/morning-brief.mjs
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

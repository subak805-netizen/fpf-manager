name: morning-brief
# FPF 아침 브리핑 — 매일 09:30 KST(00:30 UTC)에 Firestore의 fpm_brief를 읽어 텔레그램 발송.
# 필요한 Secrets: FIREBASE_SERVICE_ACCOUNT / TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID (등록 완료 2026-07-06)
# Secrets 없으면 발송을 조용히 건너뜀(실패 아님).
on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch: {}
jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/morning-brief.mjs
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

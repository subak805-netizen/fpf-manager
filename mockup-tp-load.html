<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>작업지시서 — 도식화 불러오기 데모</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  :root{ --bg:#f0eee9; --card:#fff; --bd:#e7e3dc; --line:#efece6; --text:#23211e; --t2:#6b6760; --t3:#a6a199; --accent:#185FA5; --accent-bg:#eef5fc; --accent-bd:#cfe0f3; }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'Pretendard',-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
  .wrap{max-width:760px;margin:22px auto;padding:0 16px 70px}
  h1{font-size:18px;font-weight:700;margin:0 0 4px}
  .sub{font-size:13px;color:var(--t2);margin:0 0 18px}
  .flow{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--bd);border-radius:12px;padding:12px 14px;margin-bottom:18px;font-size:12.5px;color:var(--t2);flex-wrap:wrap}
  .flow b{color:var(--accent)} .flow .ar{color:var(--t3)}
  .card{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:18px}
  .card h2{font-size:14px;font-weight:600;margin:0 0 12px}
  .slot{border:1px solid var(--bd);border-radius:12px;overflow:hidden}
  .slot-h{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:#f7f5f1;border-bottom:1px solid var(--line);font-size:12px;color:var(--t2);font-weight:500}
  .slot-h .who{color:var(--accent);font-weight:600}
  .slot-body{position:relative;height:300px;display:flex;align-items:center;justify-content:center;background:#fcfbf9}
  .slot-body img{max-width:100%;max-height:100%;object-fit:contain}
  .slot-empty{color:var(--t3);font-size:13px;text-align:center;line-height:1.7}
  .slot-acts{display:flex;gap:8px;padding:11px 12px;border-top:1px solid var(--line)}
  .btn{flex:1;height:40px;border:1px solid var(--bd);background:#fff;border-radius:9px;font-size:13px;font-family:inherit;color:var(--text);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px}
  .btn:hover{background:#f5f3ef}
  .btn.accent{color:var(--accent);border-color:var(--accent-bd);background:var(--accent-bg);font-weight:500}
  .del{position:absolute;top:8px;right:8px;width:24px;height:24px;border-radius:50%;border:none;background:rgba(0,0,0,.55);color:#fff;cursor:pointer}
  /* picker */
  .ov{position:fixed;inset:0;background:rgba(20,18,16,.45);display:none;align-items:center;justify-content:center;z-index:90;padding:20px}
  .ov.open{display:flex}
  .pick{background:#fff;border-radius:16px;width:640px;max-width:96vw;max-height:88vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 16px 50px rgba(0,0,0,.25)}
  .pick-h{padding:15px 18px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px}
  .pick-h .t{font-size:15px;font-weight:600;flex:1}
  .pick-h input{height:34px;width:160px;padding:0 10px;border:1px solid var(--bd);border-radius:8px;font-family:inherit;font-size:13px}
  .pick-h .cx{height:34px;padding:0 12px;border:1px solid var(--bd);background:#fff;border-radius:8px;cursor:pointer;font-family:inherit}
  .pick-grid{padding:16px 18px;overflow:auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:13px}
  .pcard{border:1px solid var(--bd);border-radius:11px;overflow:hidden;cursor:pointer;transition:border-color .12s,box-shadow .12s}
  .pcard:hover{border-color:var(--accent-bd);box-shadow:0 0 0 3px var(--accent-bg)}
  .pcard .pv{height:110px;background:#fbfaf8;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .pcard .pv img{max-width:100%;max-height:100%;object-fit:contain}
  .pcard .nm{font-size:12.5px;font-weight:600;padding:8px 10px 2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pcard .cd{font-size:11px;color:var(--t2);padding:0 10px 9px}
  .pick-f{padding:12px 18px;border-top:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center}
  .pick-f .hint{font-size:12px;color:var(--t3)}
  .mini{height:36px;padding:0 14px;border:1px solid var(--accent-bd);background:var(--accent-bg);color:var(--accent);border-radius:9px;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer}
  /* draw modal */
  .modal{position:fixed;inset:0;background:rgba(20,18,16,.5);display:none;z-index:100;flex-direction:column}
  .modal.open{display:flex}
  .mb{height:52px;background:#fff;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px;padding:0 14px;flex:0 0 52px}
  .mb .t{font-size:14px;font-weight:600;flex:1}
  .mb button{height:36px;border-radius:9px;font-size:13px;font-family:inherit;cursor:pointer}
  .mb .x{padding:0 12px;border:1px solid var(--bd);background:#fff}
  .mb .save{padding:0 16px;border:1px solid var(--accent);background:var(--accent);color:#fff;font-weight:500}
  .mbody{flex:1}.mbody iframe{width:100%;height:100%;border:0;display:block}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:rgba(28,26,23,.9);color:#fff;font-size:13px;padding:10px 18px;border-radius:999px;opacity:0;transition:.2s;z-index:200;pointer-events:none}
  .toast.show{opacity:1}
</style>
</head>
<body>
<div class="wrap">
  <h1>작업지시서 · 스트라이프 셔츠 <span style="font-size:13px;color:var(--t2);font-weight:400">AR-2401</span></h1>
  <p class="sub">불러오기 방식 데모 — 도식화 탭에서 만든 그림을 <b>작지에서 골라 넣기</b></p>
  <div class="flow">🎨 <b>도식화 탭</b>(라이브러리에서 그려 저장) <span class="ar">→</span> 📋 <b>작업지시서</b>에서 <b>📂 불러오기</b> <span class="ar">→</span> 슬롯에 삽입 <span class="ar">·</span> 어떤 도식화인지 이름 표시</div>

  <div class="card">
    <h2>📐 봉제 도식화</h2>
    <div class="slot">
      <div class="slot-h"><span>봉제 도식화</span><span class="who" id="who"></span></div>
      <div class="slot-body" id="sb"><div class="slot-empty">아직 비어있어요<br>＋ 사진 올리기 또는 📂 도식화 불러오기</div></div>
      <div class="slot-acts">
        <button class="btn" onclick="pickPhoto()">＋ 사진</button>
        <button class="btn accent" onclick="openPicker()">📂 도식화 불러오기</button>
      </div>
    </div>
  </div>
</div>

<input type="file" id="photo-input" accept="image/*" style="display:none">

<!-- 불러오기 picker -->
<div class="ov" id="ov">
  <div class="pick">
    <div class="pick-h"><div class="t">📂 도식화 불러오기</div><input id="psearch" placeholder="품번·이름 검색" oninput="renderPick()"><button class="cx" onclick="closePicker()">닫기</button></div>
    <div class="pick-grid" id="pgrid"></div>
    <div class="pick-f"><span class="hint">도식화 탭에서 만든 그림들이에요</span><button class="mini" onclick="drawNew()">＋ 새로 그리기</button></div>
  </div>
</div>

<!-- 그리기 modal -->
<div class="modal" id="modal">
  <div class="mb"><div class="t" id="mtitle">🎨 새 도식화</div><button class="x" onclick="closeM()">닫기</button><button class="save" onclick="saveNew()">✓ 저장</button></div>
  <div class="mbody"><iframe id="frame" title="도식화"></iframe></div>
</div>
<div class="toast" id="toast"></div>

<script>
const LS='fpf_dosik_projects';
function lib(){ try{return JSON.parse(localStorage.getItem(LS)||'[]');}catch(e){return [];} }
function saveLib(a){ localStorage.setItem(LS,JSON.stringify(a)); }
/* 라이브러리 비어있으면 샘플 시드(데모용) */
function flat(label){ return 'data:image/svg+xml;utf8,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><g fill="none" stroke="#222" stroke-width="2"><path d="M70 50 L50 40 L25 62 L40 95 L52 85 L52 165 L148 165 L148 85 L160 95 L175 62 L150 40 L130 50 Q100 66 70 50Z"/><path d="M70 50 L100 78 L130 50"/></g><text x="100" y="190" font-size="13" fill="#888" text-anchor="middle" font-family="sans-serif">'+label+'</text></svg>'); }
(function seed(){ var a=lib(); if(!a.length){ a=[
  {id:'s1',name:'셔츠 앞 도식화',code:'AR-2401',png:flat('앞'),updated:Date.now()},
  {id:'s2',name:'셔츠 뒤 도식화',code:'AR-2401',png:flat('뒤'),updated:Date.now()-1e6},
  {id:'s3',name:'아동 긴팔 상의',code:'AR-2402',png:flat('아동'),updated:Date.now()-2e6},
]; saveLib(a); } })();

let loaded=null;
function setImg(name,url){ document.getElementById('sb').innerHTML='<img src="'+url+'"><button class="del" onclick="clr()">×</button>'; document.getElementById('who').textContent=name?('📎 '+name):''; }
function clr(){ document.getElementById('sb').innerHTML='<div class="slot-empty">아직 비어있어요<br>＋ 사진 올리기 또는 📂 도식화 불러오기</div>'; document.getElementById('who').textContent=''; }
function pickPhoto(){ var i=document.getElementById('photo-input'); i.value=''; i.click(); }
document.getElementById('photo-input').addEventListener('change',e=>{ var f=e.target.files[0]; if(!f)return; var r=new FileReader(); r.onload=()=>setImg('업로드 사진',r.result); r.readAsDataURL(f); });
/* picker */
function openPicker(){ renderPick(); document.getElementById('ov').classList.add('open'); }
function closePicker(){ document.getElementById('ov').classList.remove('open'); }
function renderPick(){
  var q=(document.getElementById('psearch').value||'').trim();
  var list=lib().filter(p=>!q||((p.name+' '+(p.code||'')).indexOf(q)>=0)).sort((a,b)=>b.updated-a.updated);
  var g=document.getElementById('pgrid');
  g.innerHTML=list.length?list.map(p=>'<div class="pcard" onclick="choose(\''+p.id+'\')"><div class="pv">'+(p.png?'<img src="'+p.png+'">':'없음')+'</div><div class="nm">'+esc(p.name)+'</div><div class="cd">'+(p.code?esc(p.code):'-')+'</div></div>').join(''):'<div style="grid-column:1/-1;text-align:center;color:#a6a199;padding:30px 0">도식화 탭에서 먼저 만들어주세요.</div>';
}
function esc(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function choose(id){ var p=lib().find(x=>x.id===id); if(!p)return; setImg((p.code?p.code+' · ':'')+p.name, p.png); closePicker(); toast('"'+p.name+'" 불러옴 ✓'); }
/* 새로 그리기 → 도식화 라이브러리에 추가 후 불러오기 */
let newName=null;
function drawNew(){ var n=prompt('새 도식화 이름','셔츠 앞 도식화'); if(!n)return; newName=n; document.getElementById('mtitle').textContent='🎨 '+n; var f=document.getElementById('frame'); if(!f.src)f.src='mockup-techsketch.html'; closePicker(); document.getElementById('modal').classList.add('open'); }
function closeM(){ document.getElementById('modal').classList.remove('open'); }
function saveNew(){ var f=document.getElementById('frame'); try{ var png=f.contentWindow.exportPNG(); var a=lib(); var p={id:'d'+Date.now(),name:newName,code:'AR-2401',png:png,updated:Date.now()}; a.push(p); saveLib(a); setImg(p.code+' · '+p.name,png); closeM(); toast('도식화 탭에 저장 + 작지에 불러옴 ✓'); }catch(e){ toast('도식화 로딩 중이에요.'); } }
function toast(m){ var t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }
</script>
</body>
</html>

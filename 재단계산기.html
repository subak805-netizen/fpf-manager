<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>재단 수량 계산기</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Apple SD Gothic Neo', sans-serif; background: #f2f2f2; color: #222; font-size: 14px; }

  h1 { font-size: 15px; font-weight: 700; padding: 18px 16px 4px; }
  .sub { font-size: 12px; color: #999; padding: 0 16px 14px; }

  .section { background: #fff; margin-bottom: 8px; padding: 14px 16px; }
  .stitle { font-size: 11px; font-weight: 700; color: #999; letter-spacing: 0.5px; margin-bottom: 10px; }

  /* 태그 형태 입력 */
  .tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .tag-item {
    display: flex; align-items: center; gap: 0;
    border: 1px solid #ddd; border-radius: 4px; overflow: hidden; background: #fff;
  }
  .tag-item input {
    border: none; padding: 5px 8px; font-size: 12px; font-weight: 600;
    width: 70px; outline: none; background: none; color: #222;
  }
  .tag-item button { border: none; background: none; color: #ccc; font-size: 15px; cursor: pointer; padding: 0 6px 0 2px; }
  .tag-item button:hover { color: #e44; }

  .add-row { display: flex; gap: 6px; margin-top: 4px; }
  .add-row input { border: 1px solid #ddd; border-radius: 4px; padding: 6px 8px; font-size: 13px; width: 90px; background: #fafafa; outline: none; }
  .add-row input:focus { border-color: #555; }
  .btn-sm { padding: 6px 12px; border: 1px dashed #bbb; border-radius: 4px; background: none; font-size: 12px; color: #555; cursor: pointer; white-space: nowrap; }
  .btn-sm:hover { background: #f0f0f0; }

  /* 사이즈 태그 */
  .sz-tag { display: flex; align-items: center; gap: 4px; background: #f0f0f0; border-radius: 4px; padding: 4px 8px; font-size: 12px; font-weight: 600; }
  .sz-tag button { border: none; background: none; color: #aaa; font-size: 14px; cursor: pointer; line-height: 1; }
  .sz-tag button:hover { color: #e44; }

  /* 컬러 카드 */
  .color-card { border: 1px solid #eee; border-radius: 6px; margin-bottom: 10px; overflow: hidden; }
  .color-card-header { display: flex; align-items: center; gap: 8px; background: #fafafa; padding: 8px 12px; border-bottom: 1px solid #eee; }
  .color-card-header input[type=text] { border: none; background: none; font-size: 13px; font-weight: 600; width: 100%; outline: none; color: #222; }
  .color-card-header input::placeholder { color: #bbb; font-weight: 400; }
  .btn-del-color { border: none; background: none; color: #ccc; font-size: 18px; cursor: pointer; }
  .btn-del-color:hover { color: #e44; }

  .size-grid { padding: 10px 12px; }
  .grid-header { display: flex; gap: 6px; margin-bottom: 6px; padding-bottom: 6px; border-bottom: 1px solid #f0f0f0; }
  .gh-size { min-width: 30px; font-size: 11px; color: #bbb; }
  .gh-col { flex: 1; font-size: 11px; color: #888; text-align: center; font-weight: 600; }
  .gh-target { width: 72px; font-size: 11px; color: #bbb; text-align: center; }

  .size-row { display: flex; gap: 6px; align-items: center; margin-bottom: 6px; }
  .size-label { min-width: 30px; font-size: 12px; font-weight: 700; color: #555; }
  .size-row input[type=number] { flex: 1; border: 1px solid #eee; border-radius: 4px; padding: 6px 6px; font-size: 13px; background: #fafafa; text-align: right; outline: none; min-width: 0; }
  .size-row input:focus { border-color: #888; background: #fff; }
  .target-input { width: 72px !important; flex: none !important; border-style: dashed !important; }

  .btn-add-color { width: 100%; padding: 10px; border: 1px dashed #ccc; border-radius: 6px; background: none; font-size: 12px; color: #666; cursor: pointer; margin-bottom: 8px; }
  .btn-add-color:hover { background: #f0f0f0; }

  .btn-calc { display: block; width: calc(100% - 32px); margin: 0 16px 14px; padding: 13px; background: #222; color: #fff; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; }
  .btn-calc:hover { background: #444; }

  /* 결과 */
  .result-wrap { background: #fff; margin-bottom: 8px; overflow-x: auto; }
  .result-head-bar { padding: 12px 16px 0; font-size: 11px; font-weight: 700; color: #999; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 8px; }
  th { background: #222; color: #fff; font-size: 11px; font-weight: 600; padding: 8px 10px; text-align: right; white-space: nowrap; }
  th:first-child, th:nth-child(2) { text-align: left; }
  td { padding: 9px 10px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; text-align: right; }
  td:first-child, td:nth-child(2) { text-align: left; }
  tr:last-child td { border-bottom: none; }
  tr.total td { background: #f5f5f5; font-weight: 700; }
  tr.color-group td { background: #fafafa; font-weight: 700; font-size: 12px; color: #555; padding: 6px 10px; border-top: 2px solid #e8e8e8; }

  .red  { color: #c62828; font-weight: 700; }
  .green { color: #1e7e34; }
  .gray { color: #bbb; font-size: 11px; }
  .badge { display: inline-block; font-size: 10px; padding: 2px 5px; border-radius: 3px; font-weight: 600; margin-left: 3px; vertical-align: middle; }
  .b-ok    { background: #e6f4ea; color: #1e7e34; }
  .b-short { background: #fdecea; color: #c62828; }
  .note-sm { display: block; font-size: 11px; color: #bbb; }
</style>
</head>
<body>

<h1>재단 수량 계산기</h1>
<p class="sub">재단된 수량 입력 → 생산 가능 수량 확인</p>

<!-- 원단 종류 -->
<div class="section">
  <div class="stitle">원단 종류</div>
  <div class="tag-list" id="fabric-list"></div>
  <div class="add-row">
    <input type="text" id="new-fabric" placeholder="예: 미까시" maxlength="10"
      onkeydown="if(event.key==='Enter') addFabric()">
    <button class="btn-sm" onclick="addFabric()">+ 추가</button>
  </div>
</div>

<!-- 사이즈 -->
<div class="section">
  <div class="stitle">사이즈</div>
  <div class="tag-list" id="size-list"></div>
  <div class="add-row">
    <input type="text" id="new-size" placeholder="예: XL" maxlength="6"
      onkeydown="if(event.key==='Enter') addSize()">
    <button class="btn-sm" onclick="addSize()">+ 추가</button>
  </div>
</div>

<!-- 컬러별 입력 -->
<div class="section">
  <div class="stitle">컬러별 재단 수량</div>
  <div id="color-cards"></div>
  <button class="btn-add-color" onclick="addColor()">+ 컬러 추가</button>
</div>

<button class="btn-calc" onclick="calculate()">계산하기</button>

<div id="result-area"></div>

<datalist id="cs">
  <option value="아이레드"><option value="아이곤색"><option value="회색곤색">
  <option value="회색카키"><option value="블랙"><option value="화이트"><option value="네이비">
</datalist>

<script>
let fabrics = ['몸판', '소매'];   // 원단 종류
let sizes   = ['S', 'M', 'L'];
let colors  = [];

/* ── 원단 종류 ─────────────────── */
function addFabric() {
  const inp = document.getElementById('new-fabric');
  const val = inp.value.trim();
  if (!val || fabrics.includes(val)) { inp.value = ''; return; }
  fabrics.push(val);
  inp.value = '';
  renderFabrics(); renderColors();
}
function removeFabric(i) {
  if (fabrics.length <= 1) return;
  fabrics.splice(i, 1);
  renderFabrics(); renderColors();
}
function renameFabric(i, val) { fabrics[i] = val || fabrics[i]; }

function renderFabrics() {
  document.getElementById('fabric-list').innerHTML = fabrics.map((f, i) => `
    <div class="tag-item">
      <input type="text" value="${f}" onchange="renameFabric(${i}, this.value)"
        onblur="renderColors()" style="width:${Math.max(50, f.length * 13)}px">
      <button onclick="removeFabric(${i})">×</button>
    </div>
  `).join('');
}

/* ── 사이즈 ────────────────────── */
function addSize() {
  const inp = document.getElementById('new-size');
  const val = inp.value.trim().toUpperCase();
  if (!val || sizes.includes(val)) { inp.value = ''; return; }
  sizes.push(val);
  inp.value = '';
  renderSizes(); renderColors();
}
function removeSize(i) {
  sizes.splice(i, 1);
  renderSizes(); renderColors();
}
function renderSizes() {
  document.getElementById('size-list').innerHTML = sizes.map((s, i) => `
    <div class="sz-tag">${s}<button onclick="removeSize(${i})">×</button></div>
  `).join('');
}

/* ── 컬러 ──────────────────────── */
function addColor(name='') {
  const id = Date.now() + Math.random();
  colors.push({ id, name });
  renderColors();
}
function removeColor(id) {
  colors = colors.filter(c => c.id !== id);
  renderColors();
}

function renderColors() {
  document.getElementById('color-cards').innerHTML = colors.map(c => `
    <div class="color-card">
      <div class="color-card-header">
        <input type="text" id="cname-${c.id}" value="${c.name}" placeholder="컬러명" list="cs">
        <button class="btn-del-color" onclick="removeColor(${c.id})">×</button>
      </div>
      <div class="size-grid">
        <div class="grid-header">
          <div class="gh-size"></div>
          ${fabrics.map(f => `<div class="gh-col">${f}</div>`).join('')}
          <div class="gh-target">목표</div>
        </div>
        ${sizes.map(s => `
          <div class="size-row">
            <div class="size-label">${s}</div>
            ${fabrics.map(f => `
              <input type="number" id="f-${c.id}-${s}-${fi(f)}" placeholder="장" min="0" step="1">
            `).join('')}
            <input type="number" class="target-input" id="target-${c.id}-${s}" placeholder="장" min="0" step="1">
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function fi(f) { return f.replace(/[^a-zA-Z0-9가-힣]/g, '_'); }

function gn(id) {
  const el = document.getElementById(id);
  return el && el.value !== '' ? parseInt(el.value) : null;
}

/* ── 계산 ──────────────────────── */
function calculate() {
  const rows = [];
  colors.forEach(c => {
    const colorName = (document.getElementById(`cname-${c.id}`) || {}).value || '미입력';
    sizes.forEach(s => {
      const counts = fabrics.map(f => gn(`f-${c.id}-${s}-${fi(f)}`));
      if (counts.every(v => v === null)) return;
      const filled = counts.map(v => v ?? 0);
      const canMake = Math.min(...filled);
      const target  = gn(`target-${c.id}-${s}`);
      const diff    = target !== null ? canMake - target : null;

      // 어느 원단이 부족한지
      const minVal = canMake;
      const shortFabrics = fabrics.filter((_, i) => filled[i] === minVal && filled.some(v => v > minVal));
      const excessFabrics = fabrics.map((f, i) => ({ f, surplus: filled[i] - minVal })).filter(x => x.surplus > 0);

      rows.push({ colorName, size: s, filled, canMake, target, diff, shortFabrics, excessFabrics });
    });
  });

  if (!rows.length) { document.getElementById('result-area').innerHTML = ''; return; }

  // 컬러 소계
  const ct = {};
  rows.forEach(r => {
    if (!ct[r.colorName]) ct[r.colorName] = { can: 0, tgt: 0, hasTgt: false };
    ct[r.colorName].can += r.canMake;
    if (r.target !== null) { ct[r.colorName].tgt += r.target; ct[r.colorName].hasTgt = true; }
  });

  const totalCan = rows.reduce((s,r) => s + r.canMake, 0);
  const totalTgt = rows.filter(r=>r.target!==null).reduce((s,r)=>s+r.target, 0);
  const hasTgt   = rows.some(r=>r.target!==null);

  let html = `<div class="result-wrap"><div class="result-head-bar">결과</div><table><tr>
    <th>컬러</th><th>사이즈</th>
    ${fabrics.map(f=>`<th>${f}</th>`).join('')}
    <th>생산 가능</th>
    ${hasTgt ? '<th>목표</th><th>차이</th>' : ''}
  </tr>`;

  let prev = null;
  rows.forEach(r => {
    if (r.colorName !== prev) {
      prev = r.colorName;
      const c = ct[r.colorName];
      const cdiff = c.hasTgt ? c.can - c.tgt : null;
      html += `<tr class="color-group">
        <td colspan="${2 + fabrics.length}">${r.colorName}</td>
        <td>${c.can}장 합계</td>
        ${hasTgt ? `<td>${c.hasTgt ? c.tgt+'장' : ''}</td><td>${cdiff!==null ? `<span class="${cdiff>=0?'green':'red'}">${cdiff>=0?'+':''}${cdiff}</span>` : ''}</td>` : ''}
      </tr>`;
    }

    const fabricCells = fabrics.map((f, i) => {
      const v = r.filled[i];
      const isMin = v === r.canMake && r.filled.some(x => x > v);
      return `<td>${isMin ? `<span class="red">${v}장</span>` : `${v}장`}</td>`;
    }).join('');

    let noteLines = [];
    r.shortFabrics.forEach(f => noteLines.push(`${f} 부족`));
    r.excessFabrics.forEach(({f, surplus}) => noteLines.push(`${f} ${surplus}장 남음`));
    const note = noteLines.length ? `<span class="note-sm">${noteLines.join(' · ')}</span>` : '';

    let diffCell = '';
    if (hasTgt) {
      if (r.diff !== null) {
        const sign = r.diff >= 0 ? '+' : '';
        const cls  = r.diff >= 0 ? 'green' : 'red';
        const badge = r.diff >= 0 ? `<span class="badge b-ok">충족</span>` : `<span class="badge b-short">부족</span>`;
        diffCell = `<td><span class="${cls}">${sign}${r.diff}</span>${badge}</td>`;
      } else diffCell = `<td><span class="gray">—</span></td>`;
    }

    html += `<tr>
      <td></td><td><b>${r.size}</b></td>
      ${fabricCells}
      <td><b>${r.canMake}장</b>${note}</td>
      ${hasTgt ? `<td>${r.target!==null ? r.target+'장' : '<span class="gray">—</span>'}</td>${diffCell}` : ''}
    </tr>`;
  });

  const tdiff = hasTgt ? totalCan - totalTgt : null;
  html += `<tr class="total">
    <td colspan="${2 + fabrics.length}">전체 합계</td>
    <td>${totalCan}장</td>
    ${hasTgt ? `<td>${totalTgt}장</td><td><span class="${tdiff>=0?'green':'red'}">${tdiff>=0?'+':''}${tdiff}</span></td>` : ''}
  </tr></table></div>`;

  document.getElementById('result-area').innerHTML = html;
}

// 초기화
renderFabrics();
renderSizes();
addColor('아이레드');
addColor('아이곤색');
addColor('회색곤색');
addColor('회색카키');
</script>
</body>
</html>

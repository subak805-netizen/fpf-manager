<!doctype html><html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>메뉴 탭 세련화 시안</title>
<style>
:root{
  --bg:#f4f5f7; --card:#fff; --bd:#eceef1; --bd2:#e6e9ec; --text:#1f2937; --mut:#9aa0a6; --sub:#6b7280;
  --blue:#3182f6; --blue-bg:#eaf2ff;
  --font:'Pretendard',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo',sans-serif;
}
html[data-t="retro"]{
  --bg:#F4ECD8; --card:#fff; --bd:#1c1c1c; --bd2:#1c1c1c; --text:#1c1c1c; --mut:#7a7468; --sub:#5c574c;
  --blue:#2b59ff; --blue-bg:#FFE9A8; --ink:#1c1c1c;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);font-family:var(--font);color:var(--text);-webkit-font-smoothing:antialiased;padding:20px}
html[data-t="retro"] body{font-family:'Galmuri11','Pretendard',monospace}
.toolbar{position:fixed;top:10px;right:14px;z-index:50}
.toolbar button{padding:8px 12px;border-radius:8px;border:1px solid var(--bd2);background:var(--card);font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;color:var(--text)}
.row{display:flex;gap:30px;align-items:flex-start;flex-wrap:wrap}
.col h3{font-size:12px;color:var(--sub);font-weight:800;margin:0 0 12px 4px}

/* 공통 사이드바 틀 */
.side{width:210px;background:var(--card);border:1px solid var(--bd);border-radius:16px;padding:16px 12px;display:flex;flex-direction:column}
html[data-t="retro"] .side{border:2.5px solid var(--ink);border-radius:0;box-shadow:5px 5px 0 var(--ink)}
.brand{font-size:17px;font-weight:800;letter-spacing:-.3px;padding:4px 10px 16px}

/* ===== 스타일 1: 그룹 + 부드러운 활성 pill ===== */
.s1 .grp{font-size:10.5px;font-weight:800;color:var(--mut);letter-spacing:.04em;padding:12px 11px 5px}
.s1 .grp:first-of-type{padding-top:2px}
.s1 .t{display:flex;align-items:center;gap:9px;font-size:14px;font-weight:600;color:var(--text);padding:10px 12px;border-radius:10px;cursor:pointer;position:relative}
.s1 .t:hover{background:rgba(0,0,0,.04)}
.s1 .t .dot{width:5px;height:5px;border-radius:50%;background:transparent;flex:0 0 auto}
.s1 .t.on{background:var(--blue-bg);color:var(--blue);font-weight:800}
.s1 .t.on .dot{background:var(--blue)}
html[data-t="retro"] .s1 .t{border-radius:0}
html[data-t="retro"] .s1 .t.on{color:var(--ink);box-shadow:inset 3px 0 0 var(--ink)}

/* ===== 스타일 2: 좌측 액센트 바 + 플랫 ===== */
.s2 .t{display:block;font-size:14px;font-weight:600;color:var(--sub);padding:11px 14px;cursor:pointer;border-left:3px solid transparent;border-radius:0 8px 8px 0}
.s2 .t:hover{color:var(--text);background:rgba(0,0,0,.03)}
.s2 .t.on{color:var(--blue);font-weight:800;border-left-color:var(--blue);background:var(--blue-bg)}
.s2 .sepg{height:1px;background:var(--bd);margin:9px 12px}
html[data-t="retro"] .s2 .t.on{color:var(--ink);border-left:4px solid var(--ink)}
html[data-t="retro"] .s2 .sepg{background:var(--ink);height:1.5px}
</style></head>
<body>
<div class="toolbar"><button onclick="var h=document.documentElement;h.dataset.t=h.dataset.t==='retro'?'minimal':'retro'">테마 전환</button></div>

<div class="row">
  <div class="col">
    <h3>스타일 1 — 그룹 + 부드러운 활성 (점 인디케이터)</h3>
    <div class="side s1">
      <div class="brand">생산관리</div>
      <div class="grp">생산</div>
      <div class="t on"><span class="dot"></span>진행</div>
      <div class="t"><span class="dot"></span>아이템</div>
      <div class="t"><span class="dot"></span>도식화</div>
      <div class="grp">관리</div>
      <div class="t"><span class="dot"></span>할일판</div>
      <div class="t"><span class="dot"></span>할 일</div>
      <div class="t"><span class="dot"></span>동선</div>
      <div class="t"><span class="dot"></span>불량 관리</div>
      <div class="grp">기타</div>
      <div class="t"><span class="dot"></span>분석</div>
      <div class="t"><span class="dot"></span>업체관리</div>
      <div class="t"><span class="dot"></span>참고</div>
    </div>
  </div>

  <div class="col">
    <h3>스타일 2 — 좌측 액센트 바 + 플랫 (구분선)</h3>
    <div class="side s2">
      <div class="brand">생산관리</div>
      <div class="t on">진행</div>
      <div class="t">아이템</div>
      <div class="t">도식화</div>
      <div class="sepg"></div>
      <div class="t">할일판</div>
      <div class="t">할 일</div>
      <div class="t">동선</div>
      <div class="t">불량 관리</div>
      <div class="sepg"></div>
      <div class="t">분석</div>
      <div class="t">업체관리</div>
      <div class="t">참고</div>
    </div>
  </div>
</div>
</body></html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>도식화</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
<style>
  :root{ --bg:#f0eee9; --card:#fff; --bd:#e7e3dc; --line:#efece6; --text:#23211e; --t2:#6b6760; --t3:#a6a199; --accent:#185FA5; --accent-bg:#eef5fc; --accent-bd:#cfe0f3; --danger:#A33A35; }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'Pretendard',-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
  .top{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:14px 18px;background:var(--card);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:5}
  .top h1{font-size:18px;font-weight:700;margin:0;display:flex;align-items:center;gap:8px}
  .top .sub{font-size:12px;color:var(--t2);margin-left:6px;font-weight:400}
  .btn{height:38px;padding:0 15px;border:1px solid var(--bd);background:#fff;border-radius:9px;font-size:13px;font-family:inherit;color:var(--text);cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:background .12s,border-color .12s}
  .btn:hover{background:#f5f3ef;border-color:#dbd6cf}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.primary:hover{background:#14538f}
  .wrap{max-width:900px;margin:20px auto;padding:0 16px 70px}
  .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:16px}
  .search{flex:1;height:38px;padding:0 12px;border:1px solid var(--bd);border-radius:9px;font-size:13px;font-family:inherit;background:#fff;-webkit-appearance:none;appearance:none}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px}
  .empty{text-align:center;color:var(--t3);font-size:14px;padding:60px 0;line-height:1.8}
  .cardc{background:var(--card);border:1px solid var(--bd);border-radius:14px;overflow:hidden;display:flex;flex-direction:column}
  .pv{height:150px;background:#fbfaf8;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--t3);font-size:13px;cursor:pointer;position:relative;overflow:hidden}
  .pv img{max-width:100%;max-height:100%;object-fit:contain}
  .pv .draw-hint{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(24,95,165,.0);color:transparent;font-weight:600;transition:.15s}
  .pv:hover .draw-hint{background:rgba(24,95,165,.06);color:var(--accent)}
  .cinfo{padding:11px 13px}
  .cnm{font-size:14px;font-weight:600;margin:0 0 2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cmeta{font-size:11.5px;color:var(--t2)}
  .cacts{display:flex;gap:6px;padding:0 13px 12px}
  .cacts .b{flex:1;height:32px;border:1px solid var(--bd);background:#fff;border-radius:8px;font-size:12px;font-family:inherit;cursor:pointer;color:var(--text)}
  .cacts .b:hover{background:#f5f3ef}
  .cacts .b.accent{color:var(--accent);border-color:var(--accent-bd);background:var(--accent-bg);font-weight:500}
  .cacts .b.del{color:var(--danger);border-color:#ecd6d4;flex:0 0 38px}
  /* modal */
  .modal{position:fixed;inset:0;background:rgba(20,18,16,.5);display:none;z-index:100;flex-direction:column}
  .modal.open{display:flex}
  .mb{height:54px;background:#fff;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px;padding:0 14px;flex:0 0 54px}
  .mb .t{font-size:14px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mb button{height:38px;border-radius:9px;font-size:13px;font-family:inherit;cursor:pointer}
  .mb .x{padding:0 13px;border:1px solid var(--bd);background:#fff}
  .mb .save{padding:0 18px;border:1px solid var(--accent);background:var(--accent);color:#fff;font-weight:500}
  .mbody{flex:1;background:#fff}
  .mbody iframe{width:100%;height:100%;border:0;display:block}
  .toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:rgba(28,26,23,.9);color:#fff;font-size:13px;padding:10px 18px;border-radius:999px;opacity:0;transition:opacity .2s;z-index:200;pointer-events:none}
  .toast.show{opacity:1}
</style>
</head>
<body>
  <div class="top">
    <h1>🎨 도식화 <span class="sub">품번별 도식화 모아보기 · 그리기</span></h1>
    <button class="btn primary" onclick="newProject()">＋ 새 도식화</button>
  </div>
  <div class="wrap">
    <div class="toolbar"><select id="folder-sel" onchange="setFolder(this.value)" style="height:38px;padding:0 28px 0 12px;border:1px solid var(--bd);border-radius:9px;font-family:inherit;font-size:13px;background:#fff;-webkit-appearance:none;appearance:none;cursor:pointer"></select><input class="search" id="search" placeholder="품번·품명 검색" oninput="render()"></div>
    <div id="grid" class="grid"></div>
  </div>

  <div class="modal" id="modal">
    <div class="mb"><div class="t" id="mtitle">🎨 도식화</div>
      <span id="autosave-ind" style="font-size:12px;color:#1D9E75;opacity:0;transition:opacity .3s;margin-right:6px;white-space:nowrap">✓ 자동 저장됨</span>
      <button class="x" onclick="closeM()">닫기</button>
      <button class="save" onclick="saveM()">✓ 저장</button>
    </div>
    <div class="mbody"><iframe id="frame" title="도식화"></iframe></div>
  </div>
  <div class="toast" id="toast"></div>

<script>
const LS='fpf_dosik_projects';   // 레거시(이전 전용)
let projects=[], cur=null, folderFilter='전체';
function setFolder(v){ folderFilter=v; render(); }

/* ===== IndexedDB — localStorage 5MB 한계 제거 · 메인앱 침범 방지 (index.html·에디터와 공유) ===== */
function _dosikIdbOpen(){return new Promise(function(res,rej){try{var rq=indexedDB.open('fpfDosik',1);rq.onupgradeneeded=function(){var db=rq.result;if(!db.objectStoreNames.contains('projects'))db.createObjectStore('projects',{keyPath:'id'});};rq.onsuccess=function(){res(rq.result);};rq.onerror=function(){rej(rq.error);};}catch(e){rej(e);}});}
function _idbAll(){return _dosikIdbOpen().then(function(db){return new Promise(function(res,rej){var out=[],cr=db.transaction('projects','readonly').objectStore('projects').openCursor();cr.onsuccess=function(){var c=cr.result;if(c){out.push(c.value);c.continue();}else res(out);};cr.onerror=function(){rej(cr.error);};});});}
function _idbPut(p){return _dosikIdbOpen().then(function(db){return new Promise(function(res,rej){var tx=db.transaction('projects','readwrite');tx.objectStore('projects').put(p);tx.oncomplete=function(){res(true);};tx.onerror=function(){rej(tx.error);};tx.onabort=function(){rej(tx.error);};});});}
function _idbDel(id){return _dosikIdbOpen().then(function(db){return new Promise(function(res,rej){var tx=db.transaction('projects','readwrite');tx.objectStore('projects').delete(id);tx.oncomplete=function(){res(true);};tx.onerror=function(){rej(tx.error);};});});}
/* 로컬 저장: 바뀐 프로젝트 1건만 IDB 기록 → 성공여부 반환 + 클라우드 백업 (전체 재기록 안 함=빠름) */
function persist(p){ return _idbPut(p).then(function(){ cloudPush(p); return true; }).catch(function(e){ console.warn('IDB 저장 실패',e); return false; }); }

/* ===== Firebase 클라우드 백업·동기화 (이미지=Storage, 메타=Firestore — 1MB 문서 폭발 방지) ===== */
var firebaseConfig={apiKey:"AIzaSyCx84fnTSZl9_eTMaUkts0VCyIx4qrql2I",authDomain:"fpf-manager.firebaseapp.com",projectId:"fpf-manager",storageBucket:"fpf-manager.firebasestorage.app",messagingSenderId:"415966666310",appId:"1:415966666310:web:9c4bb75cd2594cc744b447"};
var fbReady=false, fbUser=null, fbDB=null, fbStorage=null;
function initFb(attempts){ attempts=attempts||0;
  if(typeof firebase==='undefined'){ if(attempts<60)setTimeout(function(){initFb(attempts+1);},100); return; }
  try{
    if(!firebase.apps.length)firebase.initializeApp(firebaseConfig);
    fbDB=firebase.firestore(); try{ fbStorage=firebase.storage(); }catch(e){}
    firebase.auth().onAuthStateChanged(function(u){ fbUser=u; fbReady=!!(u&&fbDB); if(fbReady)cloudSyncDown(); });   // 같은 도메인=메인앱 로그인 세션 자동 공유
  }catch(e){ console.warn('Firebase 초기화 실패',e); }
}
function _dataUrlToBlob(d){ try{ var a=d.split(','),m=(a[0].match(/:(.*?);/)||[])[1]||'image/png',b=atob(a[1]),n=b.length,u=new Uint8Array(n); while(n--)u[n]=b.charCodeAt(n); return new Blob([u],{type:m}); }catch(e){ return null; } }
function _dosikDoc(){ return fbDB.collection('users').doc(fbUser.uid).collection('data').doc('fpm_dosik'); }
function cloudPush(p){
  if(!fbReady||!fbUser||!fbDB||!fbStorage||!p)return;
  var uid=fbUser.uid;
  var writeMeta=function(pngUrl,jsonUrl){ var meta={id:p.id,name:p.name||'무제',code:p.code||'',folder:p.folder||'기타',updated:p.updated||Date.now()}; if(pngUrl)meta.pngUrl=pngUrl; if(jsonUrl)meta.jsonUrl=jsonUrl; var o={items:{}}; o.items[p.id]=meta; _dosikDoc().set(o,{merge:true}).catch(function(){}); };
  try{
    if(!p.png){ return; }
    var blob=/^data:/.test(p.png)?_dataUrlToBlob(p.png):null;
    if(!blob){ writeMeta(p._pngUrl||p.png,p._jsonUrl||null); return; }   // 이미 URL(클라우드 수신본)이면 그대로
    var pref=fbStorage.ref().child('dosik/'+uid+'/'+p.id+'.png');
    pref.put(blob).then(function(){return pref.getDownloadURL();}).then(function(pngUrl){
      p._pngUrl=pngUrl;
      var jref=fbStorage.ref().child('dosik/'+uid+'/'+p.id+'.json');
      jref.put(new Blob([JSON.stringify({state:p.state||null,frame:p.frame||null})],{type:'application/json'}))
        .then(function(){return jref.getDownloadURL();}).then(function(jsonUrl){ p._jsonUrl=jsonUrl; writeMeta(pngUrl,jsonUrl); })
        .catch(function(){ writeMeta(pngUrl,null); });
    }).catch(function(e){ console.warn('Storage 업로드 실패 — Storage 보안규칙(dosik/ 경로 허용) 확인',e); });
  }catch(e){}
}
function cloudDelete(id){
  if(!fbReady||!fbUser||!fbDB)return; var uid=fbUser.uid;
  try{ var fe={}; fe['items.'+id]=firebase.firestore.FieldValue.delete(); _dosikDoc().update(fe).catch(function(){});
    if(fbStorage){ fbStorage.ref().child('dosik/'+uid+'/'+id+'.png').delete().catch(function(){}); fbStorage.ref().child('dosik/'+uid+'/'+id+'.json').delete().catch(function(){}); }
  }catch(e){}
}
/* 수신: 프로젝트별 updated 최신우선 병합 (로컬 최신이면 유지·로컬에만 있으면 올림) — 통째 덮어쓰기 금지 */
function cloudSyncDown(){
  if(!fbReady||!fbUser||!fbDB)return;
  _dosikDoc().get().then(function(snap){
    var items=(snap.exists&&snap.data()&&snap.data().items)||{};
    var changed=false, chain=Promise.resolve();
    Object.keys(items).forEach(function(id){
      var rem=items[id], loc=projects.find(function(x){return x.id===id;});
      if(loc&&(loc.updated||0)>=(rem.updated||0))return;   // 로컬이 최신 → 유지
      chain=chain.then(function(){
        var rec={id:id,name:rem.name||'무제',code:rem.code||'',folder:rem.folder||'기타',updated:rem.updated||0,png:rem.pngUrl||null,_pngUrl:rem.pngUrl||null,_jsonUrl:rem.jsonUrl||null};
        if(rem.jsonUrl){ return fetch(rem.jsonUrl).then(function(r){return r.json();}).then(function(j){ if(j){ rec.state=j.state||null; rec.frame=j.frame||null; } return rec; }).catch(function(){return rec;}); }
        return rec;
      }).then(function(rec){ return _idbPut(rec).then(function(){ var i=projects.findIndex(function(x){return x.id===id;}); if(i>=0)projects[i]=rec; else projects.push(rec); changed=true; }).catch(function(){}); });
    });
    chain.then(function(){ if(changed)render(); });
    projects.forEach(function(p){ if(!items[p.id])cloudPush(p); });   // 로컬에만 있는 것 올림
  }).catch(function(e){ console.warn('클라우드 수신 실패',e); });
}

async function load(){
  var rows=[]; try{ rows=await _idbAll(); }catch(e){ rows=[]; }
  if(!rows.length){   // IDB 비었으면 레거시 localStorage 1회 이사 (성공 확인 후에만 원본 정리)
    var legacy=[]; try{ legacy=JSON.parse(localStorage.getItem(LS)||'[]'); }catch(e){ legacy=[]; }
    if(legacy.length){
      var ok=true;
      for(var i=0;i<legacy.length;i++){ try{ await _idbPut(legacy[i]); }catch(e){ ok=false; } }
      try{ rows=await _idbAll(); }catch(e){ rows=legacy; }
      if(ok&&rows.length>=legacy.length){ try{ localStorage.removeItem(LS); }catch(e){} }
      else if(!rows.length){ rows=legacy; }   // 이사 실패 → 원본 보존
    }
  }
  projects=rows;
  try{ if(navigator.storage&&navigator.storage.persist)navigator.storage.persist(); }catch(e){}   // 브라우저가 함부로 비우지 않게
}
function fmtDate(t){ const d=new Date(t); return (d.getMonth()+1)+'/'+d.getDate(); }
function render(){
  const q=(document.getElementById('search').value||'').trim();
  const folders=['전체',...new Set(['상의','하의','아동복', ...projects.map(p=>p.folder||'기타')])];
  const fsel=document.getElementById('folder-sel');
  if(fsel){ if(!folders.includes(folderFilter))folderFilter='전체'; fsel.innerHTML=folders.map(f=>'<option value="'+f+'">'+(f==='전체'?'📁 전체':'📁 '+f)+(f==='전체'?'':' ('+projects.filter(p=>(p.folder||'기타')===f).length+')')+'</option>').join(''); fsel.value=folderFilter; }
  let list=projects.filter(p=>!q||(p.name+' '+(p.code||'')).indexOf(q)>=0);
  if(folderFilter!=='전체') list=list.filter(p=>(p.folder||'기타')===folderFilter);
  list.sort((a,b)=>b.updated-a.updated);
  const g=document.getElementById('grid');
  if(!list.length){ g.innerHTML='<div class="empty" style="grid-column:1/-1">'+(q||folderFilter!=='전체'?'해당 조건의 도식화가 없어요.':'아직 도식화가 없어요.<br>오른쪽 위 <b>＋ 새 도식화</b>로 시작하세요.')+'</div>'; return; }
  g.innerHTML=list.map(p=>'<div class="cardc">'
    +'<div class="pv" onclick="openM(\''+p.id+'\')">'+(p.png?'<img src="'+p.png+'">':'그리기 전')+'<div class="draw-hint">✏️ 그리기</div></div>'
    +'<div class="cinfo"><p class="cnm" onclick="renameProject(\''+p.id+'\')" title="이름·품번·폴더 수정" style="cursor:pointer">'+esc(p.name)+' <span style="font-size:11px;color:var(--t3)">✎</span></p><div class="cmeta">📁'+esc(p.folder||'기타')+(p.code?' · '+esc(p.code):'')+' · 수정 '+fmtDate(p.updated)+'</div></div>'
    +'<div class="cacts"><button class="b accent" onclick="openM(\''+p.id+'\')">✏️ 그리기</button>'
    +'<button class="b" onclick="dl(\''+p.id+'\')" '+(p.png?'':'disabled style=opacity:.4')+'>PNG</button>'
    +'<button class="b del" onclick="delP(\''+p.id+'\')">🗑</button></div></div>').join('');
}
function esc(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
async function newProject(){
  // 이름 안 묻고 '무제'로 바로 생성 → 빈 캔버스로 열림 → 이름은 나중에 카드에서 수정
  const p={id:'d'+Date.now(),name:'무제',code:'',folder:'기타',png:null,updated:Date.now()};
  projects.push(p); await persist(p); render(); openM(p.id);
}
function renameProject(id){
  const p=projects.find(x=>x.id===id); if(!p)return;
  const name=prompt('도식화 이름 (품명)', p.name==='무제'?'':p.name); if(name===null)return;
  p.name=(name.trim()||'무제').slice(0,40);
  const code=prompt('품번 (선택)', p.code||''); if(code!==null)p.code=code.slice(0,24);
  const folder=prompt('폴더 (상의 / 하의 / 아동복 / 기타)', p.folder||'기타'); if(folder!==null&&folder.trim())p.folder=folder.trim();
  p.updated=Date.now(); persist(p); render();
  if(cur===id)document.getElementById('mtitle').textContent='🎨 '+p.name+(p.code?' · '+p.code:'');
}
function openM(id){ cur=id; const p=projects.find(x=>x.id===id); if(!p)return;
  document.getElementById('mtitle').textContent='🎨 '+p.name+(p.code?' · '+p.code:'');
  const f=document.getElementById('frame'); f.src='mockup-techsketch.html?proj='+encodeURIComponent(id);
  document.getElementById('modal').classList.add('open');
  startAutoSave();
}
function closeM(){ document.getElementById('modal').classList.remove('open'); stopAutoSave(); }
/* ── 30초 자동 저장 (실수로 안 저장하고 닫아도 안전) ── */
let _autoSaveTimer=null;
function startAutoSave(){ stopAutoSave(); _autoSaveTimer=setInterval(autoSaveM,30000); }
function stopAutoSave(){ if(_autoSaveTimer){clearInterval(_autoSaveTimer);_autoSaveTimer=null;} }
function autoSaveFlash(){ const el=document.getElementById('autosave-ind'); if(!el)return; el.style.opacity='1'; setTimeout(()=>{el.style.opacity='0';},1400); }
async function autoSaveM(){
  if(!document.getElementById('modal').classList.contains('open'))return;
  const f=document.getElementById('frame'); if(!f||!cur)return;
  try{
    if(!f.contentWindow||typeof f.contentWindow.exportPNG!=='function')return;
    var png=f.contentWindow.exportPNG();   // 무손실 PNG 원본 (압축 안 함 → 선명)
    var fr=null; try{ fr=f.contentWindow.exportFrameState(); }catch(e){}
    var stt=null; try{ stt=f.contentWindow.serializeState(); }catch(e){}
    const p=projects.find(x=>x.id===cur); if(!p)return;
    p.png=png; if(fr)p.frame=fr; if(stt)p.state=stt; p.updated=Date.now();
    var ok=await persist(p); render(); if(ok)autoSaveFlash();   // 실제 저장 성공일 때만 ✓ 표시
  }catch(e){}
}
async function saveM(){ const f=document.getElementById('frame'); try{ var png=f.contentWindow.exportPNG(); var fr=null; try{ fr=f.contentWindow.exportFrameState(); }catch(e){} var stt=null; try{ stt=f.contentWindow.serializeState(); }catch(e){} const p=projects.find(x=>x.id===cur); if(!p)return; p.png=png; if(fr)p.frame=fr; if(stt)p.state=stt; p.updated=Date.now(); var ok=await persist(p); render(); toast(ok?('"'+p.name+'" 저장됨 ✓ (닫기로 나가요)'):'⚠ 저장 실패 — 잠시 후 다시 시도해주세요'); }catch(e){ toast('도식화 로딩 중이에요. 잠시 후 다시.'); } }
function dl(id){ const p=projects.find(x=>x.id===id); if(!p||!p.png)return; const a=document.createElement('a'); a.href=p.png; a.download=(p.code||p.name)+'_도식화.png'; a.click(); }
function delP(id){ const p=projects.find(x=>x.id===id); if(p&&confirm('"'+p.name+'" 도식화를 삭제할까요?')){ projects=projects.filter(x=>x.id!==id); _idbDel(id).catch(function(){}); cloudDelete(id); render(); } }
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }
load().then(function(){ render(); initFb(); });
</script>
</body>
</html>

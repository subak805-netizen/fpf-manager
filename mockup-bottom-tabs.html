<!doctype html>
<html lang="ko" data-theme="minimal">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>모바일 하단 탭바 정돈안</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/quiple/galmuri/dist/galmuri.css">
<style>
:root{
  --font:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard Variable",Pretendard,sans-serif;
  --bg:#fff; --bd:#e5e7eb; --text:#1c1c1e; --t2:#8e8e93; --on:#0b69ff; --on-bg:#eaf1ff;
}
html[data-theme="retro"]{
  --font:'Galmuri11','Pretendard Variable',Pretendard,sans-serif;
  --bg:#FFFCF7; --bd:#0B0A05; --text:#0B0A05; --t2:#6b6555; --on:#0B0A05; --on-bg:#A5E6BA;
}
*{box-sizing:border-box}
body{margin:0;background:#cfcabf;font-family:var(--font);color:var(--text);padding:18px 14px 50px}
.tg{display:flex;border:2px solid #0B0A05;background:#fff;width:max-content;margin:0 auto 18px}
.tg button{font-family:var(--font);border:none;background:#fff;padding:7px 16px;font-size:12px;font-weight:700;cursor:pointer}
.tg button.on{background:#0B0A05;color:#fff}
.lab{max-width:380px;margin:18px auto 7px;font-size:12px;font-weight:800}
.as .lab{color:#9a3a2e}.to .lab{color:#1f7a4d}
.cap{font-size:11px;color:#555;max-width:380px;margin:0 auto 6px}
.phone{width:380px;max-width:100%;margin:0 auto;border:2px solid #0B0A05;background:#f4f5f7;border-radius:14px;overflow:hidden}
html[data-theme=retro] .phone{border-width:2.5px;box-shadow:4px 4px 0 #0B0A05;border-radius:0}
.scr{height:90px;background:#eceef1;display:flex;align-items:center;justify-content:center;color:#aab;font-size:12px}

/* 바 공통 */
.bar{display:flex;background:var(--bg);border-top:1px solid var(--bd)}
html[data-theme=retro] .bar{border-top:2px solid var(--bd)}
.bar a{flex:1;text-align:center;padding:10px 2px 12px;font-size:11px;color:var(--t2);text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:3px}

/* 현재: 아이콘 들쭉날쭉 */
.as .bar a .i{font-size:17px;line-height:1;height:18px}
.as .bar a.on{color:var(--on)}

/* 정돈안 A: 텍스트만 + 활성 알약 */
.toA .bar{padding:5px 4px}
.toA .bar a{padding:8px 2px;font-size:12px;font-weight:600;border-radius:10px}
.toA .bar a.on{color:var(--on);background:var(--on-bg);font-weight:800}
html[data-theme=retro] .toA .bar a{border-radius:0}
html[data-theme=retro] .toA .bar a.on{box-shadow:inset 0 3px 0 var(--ink,#0B0A05)}

/* 정돈안 B: 텍스트만 + 활성 상단 바 */
.toB .bar a{font-size:12px;font-weight:600;border-top:2.5px solid transparent;margin-top:-1px}
.toB .bar a.on{color:var(--on);font-weight:800;border-top-color:var(--on)}
</style>
</head>
<body>
<div class="tg"><button id="m" class="on" onclick="T('minimal')">기본</button><button id="r" onclick="T('retro')">레트로</button></div>

<div class="as">
  <div class="lab">지금 — 아이콘 들쭉날쭉</div>
  <div class="cap">대시보드·아이템만 아이콘(▦▤), 할일판·도식화·더보기는 제각각 → 통일 안 됨</div>
  <div class="phone"><div class="scr">화면</div>
    <div class="bar">
      <a class="on"><span class="i">▦</span>대시보드</a>
      <a><span class="i">▤</span>아이템</a>
      <a><span class="i"> </span>할일판</a>
      <a><span class="i"> </span>도식화</a>
      <a><span class="i">≡</span>더보기</a>
    </div>
  </div>
</div>

<div class="toA">
  <div class="lab">정돈안 A — 텍스트만 + 활성 알약(추천)</div>
  <div class="cap">아이콘 제거·텍스트 통일, 지금 탭은 색+배경으로 강조 (전체 메뉴 시트와 일관)</div>
  <div class="phone"><div class="scr">화면</div>
    <div class="bar">
      <a class="on">대시보드</a><a>아이템</a><a>할일판</a><a>도식화</a><a>더보기</a>
    </div>
  </div>
</div>

<div class="toB">
  <div class="lab">정돈안 B — 텍스트만 + 활성 상단 바</div>
  <div class="cap">지금 탭을 위쪽 굵은 선으로 표시 (더 미니멀)</div>
  <div class="phone"><div class="scr">화면</div>
    <div class="bar">
      <a class="on">대시보드</a><a>아이템</a><a>할일판</a><a>도식화</a><a>더보기</a>
    </div>
  </div>
</div>

<script>
function T(t){document.documentElement.setAttribute('data-theme',t);document.getElementById('m').classList.toggle('on',t==='minimal');document.getElementById('r').classList.toggle('on',t==='retro');}
</script>
</body>
</html>

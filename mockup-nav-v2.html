<!doctype html><html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>네비 재구성 시안</title>
<style>
:root{
  --bg:#f4f5f7; --card:#fff; --bd:#e6e9ec; --text:#1f2937; --mut:#9aa0a6;
  --accent:#3182f6; --accentbg:#eaf2ff; --ok:#16a34a;
  --font:'Pretendard',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo',sans-serif;
}
html[data-t="retro"]{
  --bg:#F4ECD8; --card:#fff; --bd:#1c1c1c; --text:#1c1c1c; --mut:#7a7468;
  --accent:#2b59ff; --accentbg:#FFE9A8; --ok:#1f9d55;
  --ink:#1c1c1c;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);font-family:var(--font);color:var(--text);-webkit-font-smoothing:antialiased}
html[data-t="retro"] body{font-family:'Galmuri11','Pretendard',monospace}

/* ===== 레이아웃 ===== */
.app{display:flex;min-height:100vh}
.side{width:208px;flex:0 0 208px;background:var(--card);border-right:1px solid var(--bd);
  display:flex;flex-direction:column;padding:16px 12px 12px;position:sticky;top:0;height:100vh}
html[data-t="retro"] .side{border-right:2px solid var(--ink)}
.main{flex:1;min-width:0;display:flex;flex-direction:column}

/* 제목 (사이드바 최상단) */
.brand{font-size:17px;font-weight:800;letter-spacing:-.3px;padding:6px 8px 16px;color:var(--text)}

/* 네비 탭 (이모티콘 없음, 텍스트만) */
.nav{display:flex;flex-direction:column;gap:2px}
.ntab{display:block;text-align:left;border:none;background:transparent;color:var(--text);
  font-family:inherit;font-size:14px;font-weight:600;padding:10px 12px;border-radius:9px;cursor:pointer;width:100%}
.ntab:hover{background:rgba(0,0,0,.05)}
.ntab.on{background:var(--accentbg);color:var(--accent);font-weight:800}
html[data-t="retro"] .ntab{border-radius:0}
html[data-t="retro"] .ntab.on{background:var(--accentbg);color:var(--ink);box-shadow:inset 3px 0 0 var(--ink)}

.spacer{flex:1}

/* 하단 유틸 영역 */
.footer{border-top:1px solid var(--bd);padding-top:10px;display:flex;flex-direction:column;gap:7px}
html[data-t="retro"] .footer{border-top:2px dashed var(--ink)}
.statusrow{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--mut);padding:2px 6px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--ok);flex:0 0 auto}
.statusrow .save{margin-left:auto}
.frow{display:flex;gap:6px}
.ubtn{flex:1;border:1px solid var(--bd);background:transparent;color:var(--text);font-family:inherit;
  font-size:12.5px;font-weight:600;padding:9px 8px;border-radius:8px;cursor:pointer;text-align:center}
.ubtn:hover{background:rgba(0,0,0,.04)}
html[data-t="retro"] .ubtn{border:2px solid var(--ink);border-radius:0}
.undo{display:flex;gap:6px}
.undo .ubtn{font-size:13px;font-weight:700}

/* 설정 드롭다운(접힘) */
.setwrap{position:relative}
.setmenu{display:none;position:absolute;left:0;right:0;bottom:calc(100% + 6px);background:var(--card);
  border:1px solid var(--bd);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.16);padding:6px;z-index:20}
.setmenu.open{display:block}
html[data-t="retro"] .setmenu{border:2px solid var(--ink);border-radius:0;box-shadow:4px 4px 0 var(--ink)}
.setmenu .lbl{font-size:10.5px;color:var(--mut);font-weight:700;padding:6px 8px 3px}
.setmenu select,.setmenu button{display:block;width:100%;text-align:left;border:none;background:transparent;
  font-family:inherit;font-size:13px;color:var(--text);padding:9px 9px;border-radius:7px;cursor:pointer}
.setmenu button:hover{background:rgba(0,0,0,.06)}
.setmenu .selrow{display:flex;gap:5px;padding:3px 4px 8px;border-bottom:1px solid var(--bd);margin-bottom:4px}
.setmenu .selrow select{border:1px solid var(--bd);border-radius:7px;padding:8px;font-size:13px;flex:1}
.setmenu .selrow .add{flex:0 0 38px;border:1px solid var(--bd);border-radius:7px;background:var(--accent);color:#fff;text-align:center;font-size:16px}

/* ===== 콘텐츠 상단: 유틸 줄 없음, 서브탭만 ===== */
.subtabs{display:flex;gap:6px;flex-wrap:wrap;padding:14px 22px;background:var(--bg);border-bottom:1px solid var(--bd)}
.dtab{border:none;background:transparent;font-family:inherit;font-size:14px;font-weight:600;color:var(--mut);
  padding:9px 14px;border-radius:9px;cursor:pointer}
.dtab.on{background:var(--card);color:var(--text);font-weight:800;box-shadow:0 1px 3px rgba(0,0,0,.08)}
html[data-t="retro"] .dtab{border:2px solid transparent;border-radius:0}
html[data-t="retro"] .dtab.on{border:2px solid var(--ink);background:var(--card);box-shadow:2px 2px 0 var(--ink)}

.body{padding:22px;max-width:1040px}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.kpi{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:16px 18px}
html[data-t="retro"] .kpi{border:2px solid var(--ink);border-radius:0;box-shadow:3px 3px 0 var(--ink)}
.kpi.dark{background:#1f2430;color:#fff;border-color:#1f2430}
html[data-t="retro"] .kpi.dark{background:var(--ink);color:#fff}
.kpi b{display:block;font-size:26px;font-weight:800}
.kpi span{font-size:12.5px;opacity:.7}
.note{font-size:12px;color:var(--mut);margin:0 0 12px}

.toolbar{position:fixed;top:10px;right:14px;z-index:50;display:flex;gap:8px}
.toolbar button{padding:8px 12px;border-radius:8px;border:1px solid var(--bd);background:var(--card);
  font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;color:var(--text)}
</style></head>
<body>
<div class="toolbar">
  <button onclick="var h=document.documentElement;h.dataset.t=h.dataset.t==='retro'?'minimal':'retro'">테마 전환</button>
</div>

<div class="app">
  <aside class="side">
    <div class="brand">생산관리</div>
    <nav class="nav">
      <button class="ntab on">진행</button>
      <button class="ntab">아이템</button>
      <button class="ntab">도식화</button>
      <button class="ntab">할일판</button>
      <button class="ntab">할 일</button>
      <button class="ntab">동선</button>
      <button class="ntab">불량관리</button>
      <button class="ntab">분석</button>
      <button class="ntab">업체관리</button>
      <button class="ntab">참고</button>
    </nav>
    <div class="spacer"></div>
    <div class="footer">
      <div class="statusrow"><span class="dot"></span>연동됨<span class="save">자동 저장됨</span></div>
      <div class="frow">
        <button class="ubtn">새로고침</button>
        <button class="ubtn">연동</button>
      </div>
      <div class="undo">
        <button class="ubtn" title="뒤로">뒤로</button>
        <button class="ubtn" title="되돌리기">되돌리기</button>
        <button class="ubtn" title="다시">다시</button>
      </div>
      <div class="setwrap">
        <button class="ubtn" style="width:100%" onclick="this.nextElementSibling.classList.toggle('open')">설정 · 데이터 ▾</button>
        <div class="setmenu">
          <div class="lbl">회사 선택</div>
          <div class="selrow">
            <select><option>커먼웍스</option><option>테스트</option></select>
            <button class="add">+</button>
          </div>
          <button>데이터 관리</button>
          <button>테마 전환</button>
          <button>설정</button>
        </div>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="subtabs">
      <button class="dtab on">생산 대시보드</button>
      <button class="dtab">오더 관리</button>
      <button class="dtab">샘플 대시보드</button>
      <button class="dtab">샘플 발주</button>
      <button class="dtab">결제 관리</button>
      <button class="dtab">단가장</button>
      <button class="dtab">잔량</button>
    </div>
    <div class="body">
      <p class="note">— 상단 유틸 줄 없음 · 회사선택은 좌하단 '설정·데이터' 안으로 · 새로고침/연동은 좌하단에 노출 —</p>
      <div class="kpis">
        <div class="kpi dark"><b>20</b><span>진행</span></div>
        <div class="kpi"><b>4</b><span>긴급 (D-3 이내)</span></div>
        <div class="kpi"><b>0</b><span>컨펌 임박</span></div>
        <div class="kpi"><b>23</b><span>출고 완료</span></div>
      </div>
      <p class="note">진행 리스트는 기존 그대로 (이 시안은 헤더/사이드바 구조만 보여줍니다)</p>
    </div>
  </main>
</div>
</body></html>

<!doctype html>
<html lang="ko" data-theme="minimal">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>부자재집 거래처 원장 — 미리보기 v2</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css');
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
@import url('https://cdn.jsdelivr.net/npm/galmuri@2.40.3/dist/galmuri.css');

:root{
  --page-bg:#f0eee9; --font:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard Variable",sans-serif;
  --text:#1a1a1a; --t2:#555; --t3:#8a8a8a;
  --bg:#fff; --bg2:#f8f7f5; --bd:#e0ddd8; --bd2:#c5c0ba; --r:8px;
  --blue:#185FA5; --bbg:#E6F1FB; --green:#1D9E75; --gbg:#E1F5EE; --red:#A32D2D; --rbg:#FFEBEE; --amber:#854F0B;
  --title-font:var(--font); --num-font:var(--font);
}
html[data-theme="retro"]{
  --page-bg:#EFE8D4; --font:'Pretendard Variable','Pretendard',sans-serif;
  --text:#0B0A05; --t2:#3a3528; --t3:#6b6555;
  --bg:#fff; --bg2:#F5F1E8; --bd:#0B0A05; --bd2:#0B0A05; --r:0;
  --blue:#0B0A05; --bbg:#B0DBF0; --green:#A5E6BA; --gbg:#E8F6EE; --red:#c0392b; --rbg:#fbe9e7; --amber:#0B0A05;
  --title-font:'Galmuri11',monospace; --num-font:'Press Start 2P',monospace;
}
*{box-sizing:border-box}
body{margin:0;background:var(--page-bg);font-family:var(--font);color:var(--text);-webkit-font-smoothing:antialiased;padding:0 0 120px}
.wrap{max-width:1000px;margin:0 auto;padding:16px 14px}
body.phone .wrap{max-width:390px;border-left:1px dashed var(--t3);border-right:1px dashed var(--t3)}
.tnum{font-variant-numeric:tabular-nums}

.demo-bar{position:sticky;top:0;z-index:50;background:#111;color:#fff;display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:8px 12px;font-size:12px}
.demo-bar button{background:#333;color:#fff;border:1px solid #555;border-radius:6px;padding:5px 10px;font-size:12px;cursor:pointer;font-family:inherit}
.demo-bar button.on{background:#A5E6BA;color:#111;border-color:#A5E6BA;font-weight:700}
.demo-note{color:#bbb;margin-left:auto;font-size:11px}

.page-h{display:flex;align-items:flex-end;gap:10px;flex-wrap:wrap;margin:6px 0}
.page-h h1{font-size:22px;font-family:var(--title-font);margin:0}
html[data-theme="retro"] .page-h h1{background:#fff;border:2.5px solid #0B0A05;box-shadow:4px 4px 0 #0B0A05;padding:6px 12px;font-size:18px}
.muted{color:var(--t3);font-size:12px}

/* 상단 컨트롤 카드 */
.topcard{background:var(--bg);border:1px solid var(--bd);border-radius:var(--r);padding:12px 14px;margin-top:8px}
html[data-theme="retro"] .topcard{border:2.5px solid #0B0A05;box-shadow:3px 3px 0 #0B0A05}
.ctl{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.ctl + .ctl{margin-top:10px;padding-top:10px;border-top:1px dashed var(--bd)}
.ctl label{font-weight:800;font-size:13px;white-space:nowrap}
select,input{padding:8px 11px;border:1px solid var(--bd);border-radius:var(--r);font-size:14px;font-family:var(--font);background:var(--bg);color:var(--text);-webkit-appearance:none;appearance:none}
html[data-theme="retro"] select,html[data-theme="retro"] input{border:2px solid #0B0A05}
.supsel{min-width:150px;font-weight:700}
.meta{margin-left:auto;text-align:right;color:var(--t2);font-size:12px;line-height:1.5}
.chip{font-size:13px;padding:6px 14px;border-radius:16px;border:1px solid var(--bd);background:var(--bg);color:var(--text);font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
.chip.on{background:var(--blue);border-color:var(--blue);color:#fff}
html[data-theme="retro"] .chip{border:2px solid #0B0A05;border-radius:0}
html[data-theme="retro"] .chip.on{background:#B0DBF0;color:#0B0A05;box-shadow:2px 2px 0 #0B0A05}
.seg{display:inline-flex;border:1px solid var(--bd);border-radius:var(--r);overflow:hidden}
html[data-theme="retro"] .seg{border:2px solid #0B0A05}
.seg button{border:none;background:var(--bg);color:var(--t2);padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.seg button.on{background:var(--blue);color:#fff}
html[data-theme="retro"] .seg button.on{background:#B0DBF0;color:#0B0A05}
.seg.big button{padding:9px 20px;font-size:14px}
.seg.big button.on{background:var(--green);color:#fff}
html[data-theme="retro"] .seg.big button.on{background:#A5E6BA;color:#0B0A05}
.date-in{width:140px;font-size:13px}
.preset{font-size:12px;padding:5px 10px;border-radius:14px;border:1px dashed var(--bd2);background:var(--bg);color:var(--t2);cursor:pointer;font-family:inherit}
.preset.on{background:var(--bbg);border-style:solid;border-color:var(--blue);color:var(--blue);font-weight:700}
html[data-theme="retro"] .preset{border:2px solid #0B0A05;border-radius:0}
html[data-theme="retro"] .preset.on{background:#FFF6B8;color:#0B0A05}

/* 요약 */
.metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:12px 0}
.metric{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:10px 8px;text-align:center;min-height:62px;display:flex;flex-direction:column;justify-content:center;gap:3px}
html[data-theme="retro"] .metric{box-shadow:2px 2px 0 #0B0A05}
.metric .ml{font-size:11px;color:var(--t2);white-space:nowrap}
.metric .mv{font-size:16px;font-weight:800;white-space:nowrap;font-family:var(--num-font)}
html[data-theme="retro"] .metric .mv{font-size:13px}
.metric.tot{background:var(--bbg);border-color:var(--blue)}.metric.tot .mv{color:var(--blue)}
.metric.due{background:var(--rbg);border-color:var(--red)}.metric.due .mv{color:var(--red)}
.metric.paid{background:var(--gbg);border-color:var(--green)}.metric.paid .mv{color:#15803d}
html[data-theme="retro"] .metric.paid .mv{color:#0B0A05}

/* 카드/표 */
.card{background:var(--bg);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden}
html[data-theme="retro"] .card{border:2.5px solid #0B0A05;box-shadow:4px 4px 0 #0B0A05}
.card-h{display:flex;align-items:center;gap:8px;padding:11px 14px;background:var(--bg2);border-bottom:1px solid var(--bd)}
html[data-theme="retro"] .card-h{background:#B0DBF0;border-bottom:2.5px solid #0B0A05}
.card-h h3{font-size:14px;margin:0;font-family:var(--title-font)}
.spc{margin-left:auto}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 12px;min-height:32px;border:1px solid var(--bd);border-radius:var(--r);background:var(--bg);color:var(--text);font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit}
html[data-theme="retro"] .btn{border:2px solid #0B0A05;box-shadow:2px 2px 0 #0B0A05}
.btn.pri{background:var(--green);border-color:var(--green);color:#fff}
html[data-theme="retro"] .btn.pri{color:#0B0A05}

.wrapx{overflow-x:auto}
table.led{width:100%;border-collapse:collapse;font-size:13px}
.led thead th{background:var(--bg);color:var(--t2);font-weight:700;font-size:12px;text-align:right;padding:9px 10px;border-bottom:2px solid var(--bd);white-space:nowrap}
.led thead th.l{text-align:left}
.led tbody td{padding:9px 10px;border-bottom:1px solid var(--bd);text-align:right;vertical-align:middle}
.led tbody td.l{text-align:left}
.c-date{white-space:nowrap;color:var(--t2);font-size:12px}
.c-trim{font-weight:800;color:var(--text);font-size:13.5px}     /* 품명(부자재) 진하게 */
.c-item{font-weight:600;color:var(--text)}                       /* 제품명 진하게 */
.c-spec{color:var(--t2);font-size:12px;white-space:nowrap}
.c-n{font-variant-numeric:tabular-nums;white-space:nowrap}
.prw{display:inline-flex;white-space:nowrap;gap:1px;justify-content:flex-end}
.c-amt{font-weight:800}
.tag-man{font-size:10px;font-weight:700;padding:1px 6px;border-radius:9px;border:1px solid var(--bd2);color:var(--t2);background:var(--bg2);margin-left:6px}
html[data-theme="retro"] .tag-man{border-radius:0;border:1.5px solid #0B0A05;color:#0B0A05}
/* 결제 체크 */
.pay-cell{text-align:center}
.paychk{width:22px;height:22px;border:2px solid var(--bd2);border-radius:6px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;background:var(--bg);color:transparent;font-weight:900;font-size:14px}
.paychk.on{background:var(--green);border-color:var(--green);color:#fff}
html[data-theme="retro"] .paychk{border:2px solid #0B0A05;border-radius:3px}
html[data-theme="retro"] .paychk.on{background:#A5E6BA;color:#0B0A05}
tr.paid-row td:not(.pay-cell){opacity:.45;text-decoration:line-through}
tr.paid-row .c-trim{text-decoration:line-through}
.del-x{color:var(--red);cursor:pointer;border:none;background:none;font-size:13px;padding:2px 4px}
/* 아이템별 그룹 */
.grp-h td{background:var(--bg2);font-weight:800;font-size:13px;color:var(--text);border-bottom:1px solid var(--bd2)}
html[data-theme="retro"] .grp-h td{background:#FFF6B8}
.grp-sub{font-size:11px;color:var(--t2);font-weight:600}

/* 푸터 */
.foot{padding:12px 14px;background:var(--bg2);border-top:2px solid var(--bd)}
html[data-theme="retro"] .foot{border-top:2.5px solid #0B0A05}
.fl{display:flex;justify-content:flex-end;gap:14px;align-items:baseline;padding:3px 0;font-size:13px}
.fl span{color:var(--t2)}.fl b{min-width:120px;text-align:right;font-variant-numeric:tabular-nums}
.fl.grand{font-size:16px;border-top:1px dashed var(--bd2);margin-top:5px;padding-top:8px}.fl.grand b{color:var(--blue)}
.fl.paid b{color:#15803d}.fl.due b{color:var(--red);font-weight:900}
html[data-theme="retro"] .fl.paid b{color:#0B0A05}

/* 수동 폼 */
.man{display:none;gap:8px;flex-wrap:wrap;align-items:center;padding:12px 14px;background:#FFF6B8;border-bottom:1px dashed var(--bd2)}
.man.open{display:flex}
html[data-theme="retro"] .man{border-bottom:2px dashed #0B0A05}
.man input,.man select{font-size:13px;padding:7px 9px}
.man .mn{flex:1;min-width:120px}.man .ms{width:90px}.man .mq{width:64px}.man .mp{width:90px}

@media(max-width:600px){
  .metrics{grid-template-columns:repeat(3,1fr)}
  .led thead{display:none}
  .led,.led tbody,.led tr,.led td{display:block;width:100%}
  .led tbody tr{border:1px solid var(--bd);border-radius:var(--r);margin:8px 10px;padding:8px 10px 8px;background:var(--bg);position:relative}
  html[data-theme="retro"] .led tbody tr{border:2px solid #0B0A05;box-shadow:2px 2px 0 #0B0A05}
  .led tbody td{border:none;padding:3px 0;text-align:right;display:flex;justify-content:space-between;align-items:center}
  .led tbody td::before{content:attr(data-l);color:var(--t2);font-size:11px;text-align:left;margin-right:8px;font-weight:600}
  .led tbody td.l{text-align:right}
  .c-trim{font-size:15px}
  tr.grp-h{padding:6px 10px!important}
  .grp-h td{display:block;text-align:left}
  .grp-h td::before{content:""!important}
  .pay-cell{justify-content:flex-end}
  .man .mn{flex:1 1 100%}
}
</style>
</head>
<body>
<div class="demo-bar">
  <b>🧾 거래처 원장 v2</b>
  <span>테마</span><button id="t-min" class="on" onclick="setTheme('minimal')">기본</button><button id="t-ret" onclick="setTheme('retro')">레트로</button>
  <span style="margin-left:8px">폭</span><button id="w-d" class="on" onclick="setW(false)">🖥</button><button id="w-p" onclick="setW(true)">📱390</button>
  <span class="demo-note">※ 샘플 데이터</span>
</div>

<div class="wrap">
  <div class="page-h"><h1>거래처 원장</h1><span class="muted">결제 관리 › 거래처 원장 · 발주일 기준</span></div>

  <div class="topcard">
    <div class="ctl">
      <label for="sup">부자재집</label>
      <select id="sup" class="supsel" onchange="render()"></select>
      <span style="width:14px"></span>
      <label>브랜드</label>
      <span id="brandChips" style="display:inline-flex;gap:6px;flex-wrap:wrap"></span>
      <div class="meta" id="meta"></div>
    </div>
    <div class="ctl">
      <label>기간</label>
      <button class="preset" id="ps-m" onclick="setPreset('m')">이번 달</button>
      <button class="preset" id="ps-l" onclick="setPreset('l')">지난 달</button>
      <button class="preset" id="ps-a" onclick="setPreset('a')">전체</button>
      <input class="date-in" type="date" id="from" onchange="window._ps='';syncPreset();render()">
      <span>~</span>
      <input class="date-in" type="date" id="to" onchange="window._ps='';syncPreset();render()">
    </div>
    <div class="ctl">
      <label>결제상태</label>
      <div class="seg big"><button id="pv-unpaid" class="on" onclick="setPayView('unpaid')">미결제</button><button id="pv-paid" onclick="setPayView('paid')">결제완료</button></div>
      <span style="width:14px"></span>
      <label id="sortLbl">정렬</label>
      <div class="seg" id="sortSeg"><button id="v-date" class="on" onclick="setView('date')">날짜순</button><button id="v-item" onclick="setView('item')">아이템별</button></div>
    </div>
  </div>

  <div class="metrics" id="metrics"></div>

  <div class="card">
    <div class="card-h"><h3 id="title">원장</h3><span class="spc"></span>
      <button class="btn" onclick="toggleMan()">＋ 수동 추가</button>
      <button class="btn pri" onclick="alert('명세서 인쇄 (mockup)')">🖨 명세서</button></div>
    <div class="man" id="man">
      <input class="mdate" type="date" id="m-date">
      <input class="mn" id="m-name" placeholder="품명 (예: 퀵 택배비)">
      <input class="ms" id="m-spec" placeholder="규격">
      <input class="mq" type="number" id="m-qty" placeholder="수량" inputmode="numeric">
      <input class="mp" type="number" id="m-price" placeholder="단가" inputmode="numeric">
      <button class="btn pri" onclick="addMan()">추가</button>
    </div>
    <div class="wrapx"><table class="led"><thead><tr>
      <th class="l">발주일</th><th class="l">품명</th><th class="l">제품명</th><th class="l">규격</th>
      <th>수량</th><th>단가</th><th>금액</th><th>결제</th></tr></thead>
      <tbody id="body"></tbody></table></div>
    <div class="foot" id="foot"></div>
  </div>

  <p class="muted" style="text-align:center;line-height:1.7;margin-top:14px">
    <b>결제</b> 칸을 체크 = "이 값을 줬다" → 그 줄이 <b>미결제에서 사라지고 결제완료 보기로 넘어가요</b> (공장 결제완료와 동일).<br>
    결제완료 보기는 <b>월별로 묶여</b> 정리 · 위쪽 요약엔 결제완료/미결제 금액이 항상 갈라져 보여요 · 🖨명세서 인쇄.
  </p>
</div>

<script>
var DATA={
  '메이드':{ phone:'010-1234-5678', bank:'국민 123-45-6789', rows:[
    {date:'2026-06-02',trim:'YKK 코일지퍼 5호',item:'기모후드집업',brand:'더프루토',spec:'18cm',qty:320,unit:'개',price:280,src:'auto',paid:true},
    {date:'2026-06-02',trim:'메탈단추 15mm',item:'기모후드집업',brand:'더프루토',spec:'15mm',qty:480,unit:'개',price:60,src:'auto',paid:true},
    {date:'2026-06-05',trim:'메인라벨 직조',item:'기모조거팬츠',brand:'더프루토',spec:'4×2cm',qty:220,unit:'개',price:180,src:'auto',paid:false},
    {date:'2026-06-05',trim:'케어라벨',item:'기모조거팬츠',brand:'더프루토',spec:'-',qty:230,unit:'개',price:90,src:'auto',paid:false},
    {date:'2026-06-09',trim:'심지',item:'체크반팔블라우스',brand:'더프루토',spec:'110cm',qty:6,unit:'롤',price:8000,src:'auto',paid:false},
    {date:'2026-06-10',trim:'퀵 택배비',item:'',brand:'더프루토',spec:'-',qty:1,unit:'건',price:9000,src:'man',paid:false},
    {date:'2026-05-24',trim:'바이어스재단',item:'에코백',brand:'더프루토',spec:'-',qty:0,unit:'',price:20000,src:'auto',paid:true},
    {date:'2026-06-03',trim:'YKK 지퍼 3호',item:'워크자켓',brand:'아루드',spec:'15cm',qty:200,unit:'개',price:240,src:'auto',paid:false},
    {date:'2026-06-03',trim:'스냅단추',item:'워크자켓',brand:'아루드',spec:'12mm',qty:300,unit:'세트',price:45,src:'auto',paid:false},
  ]},
  '패션포인트':{ phone:'02-555-7788', bank:'신한 110-222-33333', rows:[
    {date:'2026-06-07',trim:'면 재봉실',item:'스트라이프티',brand:'더프루토',spec:'#60',qty:50,unit:'개',price:1200,src:'auto',paid:false},
  ]},
};
var ALL_BRANDS=['더프루토','아루드','리틀그로브'];
window._ps='m'; window._view='date'; window._brand=''; window._payView='unpaid';

function won(n){return Math.round(n||0).toLocaleString('ko-KR');}
function curSup(){return document.getElementById('sup').value;}
function ym(d){return (d||'').slice(0,7);}

(function(){var s=document.getElementById('sup');Object.keys(DATA).forEach(function(k){var o=document.createElement('option');o.value=k;o.textContent=k;s.appendChild(o);});})();

function thisMonth(){return '2026-06';} function lastMonth(){return '2026-05';}
function setPreset(p){window._ps=p;
  var f=document.getElementById('from'),t=document.getElementById('to');
  if(p==='m'){f.value='2026-06-01';t.value='2026-06-30';}
  else if(p==='l'){f.value='2026-05-01';t.value='2026-05-31';}
  else {f.value='';t.value='';}
  syncPreset();render();}
function syncPreset(){['m','l','a'].forEach(function(x){document.getElementById('ps-'+x).classList.toggle('on',window._ps===x);});}
function setView(v){window._view=v;document.getElementById('v-date').classList.toggle('on',v==='date');document.getElementById('v-item').classList.toggle('on',v==='item');render();}
function setPayView(v){window._payView=v;document.getElementById('pv-unpaid').classList.toggle('on',v==='unpaid');document.getElementById('pv-paid').classList.toggle('on',v==='paid');render();}

function supBrands(d){var s={};d.rows.forEach(function(r){if(r.brand)s[r.brand]=1;});return ALL_BRANDS.filter(function(b){return s[b];});}
function renderBrandChips(d){
  var brands=supBrands(d);
  if(!window._brand||brands.indexOf(window._brand)<0)window._brand=brands[0]||'';
  var box=document.getElementById('brandChips');
  box.innerHTML=brands.map(function(b){return '<button class="chip'+(window._brand===b?' on':'')+'" onclick="window._brand=\''+b+'\';render()">'+b+'</button>';}).join('');
}

function filtered(d){
  var f=document.getElementById('from').value, t=document.getElementById('to').value;
  return d.rows.filter(function(r){
    if(r.brand!==window._brand)return false;
    if(f&&r.date<f)return false;
    if(t&&r.date>t)return false;
    return true;
  });
}

function rowHTML(r){
  var amt=(r.qty?r.qty*r.price:r.price);
  var man=r.src==='man'?'<span class="tag-man">수동</span>':'';
  var del=r.src==='man'?'<button class="del-x" onclick="delMan('+DATA[curSup()].rows.indexOf(r)+')">✕</button>':'';
  return '<tr class="'+(r.paid?'paid-row':'')+'">'
    +'<td class="l c-date" data-l="발주일">'+r.date.slice(5).replace('-','/')+'</td>'
    +'<td class="l c-trim" data-l="품명">'+r.trim+man+'</td>'
    +'<td class="l c-item" data-l="제품명">'+(r.item||'-')+'</td>'
    +'<td class="l c-spec" data-l="규격">'+(r.spec||'-')+'</td>'
    +'<td class="c-n" data-l="수량">'+(r.qty?won(r.qty)+r.unit:'-')+'</td>'
    +'<td class="c-n" data-l="단가">'+(r.price?won(r.price):'-')+'</td>'
    +'<td class="c-n c-amt" data-l="금액"><span class="prw">'+won(amt)+'<span>원</span></span></td>'
    +'<td class="pay-cell" data-l="결제"><span class="paychk'+(r.paid?' on':'')+'" onclick="togglePaid(this)" data-i="'+DATA[curSup()].rows.indexOf(r)+'">'+(r.paid?'✓':'')+'</span>'+del+'</td>'
    +'</tr>';
}
function togglePaid(el){var i=+el.dataset.i;DATA[curSup()].rows[i].paid=!DATA[curSup()].rows[i].paid;render();}

function render(){
  var sup=curSup(), d=DATA[sup];
  renderBrandChips(d);
  document.getElementById('title').textContent=sup+' › '+window._brand+' 원장 · '+(window._payView==='paid'?'결제완료':'미결제');
  document.getElementById('meta').innerHTML='📞 '+d.phone+'<br>🏦 '+d.bank;
  syncPreset();

  var all=filtered(d).slice().sort(function(a,b){return a.date<b.date?-1:a.date>b.date?1:0;});
  var supplyAll=0,supplyPaid=0;
  all.forEach(function(r){var amt=(r.qty?r.qty*r.price:r.price);supplyAll+=amt;if(r.paid)supplyPaid+=amt;});
  var supplyDue=supplyAll-supplyPaid;
  var vat=Math.round(supplyAll*0.1), grand=supplyAll+vat;
  var paidTot=Math.round(supplyPaid*1.1), dueTot=Math.round(supplyDue*1.1);

  // 결제상태로 분리 (공장처럼 미결제/완료 보기)
  var paidV=window._payView==='paid';
  var rows=all.filter(function(r){return paidV?r.paid:!r.paid;});
  // 완료 보기는 월별 묶음 고정 → 정렬 토글 숨김
  document.getElementById('sortSeg').style.display=paidV?'none':'';
  document.getElementById('sortLbl').style.display=paidV?'none':'';

  var body=document.getElementById('body');
  if(!rows.length){
    var msg=paidV?'아직 결제완료한 내역이 없어요.':'이 기간 '+window._brand+' 미결제 내역이 없어요. 👍';
    body.innerHTML='<tr><td class="l" colspan="8" style="padding:24px;text-align:center;color:var(--t3)">'+msg+'</td></tr>';
  } else if(paidV){
    // 결제완료 = 월별 묶음 (공장 완료탭 방식)
    var mg={},mo=[];
    rows.forEach(function(r){var k=r.date.slice(0,7);if(!mg[k]){mg[k]=[];mo.push(k);}mg[k].push(r);});
    mo.sort();var html='';
    mo.forEach(function(k){
      var gr=mg[k],gsup=0;gr.forEach(function(r){gsup+=(r.qty?r.qty*r.price:r.price);});
      var lbl=k.slice(0,4)+'년 '+(+k.slice(5,7))+'월';
      html+='<tr class="grp-h"><td class="l" colspan="8">🗓 '+lbl+' <span class="grp-sub">· '+gr.length+'건 · 결제 '+won(Math.round(gsup*1.1))+'원</span></td></tr>';
      gr.forEach(function(r){html+=rowHTML(r);});
    });
    body.innerHTML=html;
  } else if(window._view==='item'){
    // 아이템별 묶음
    var groups={},order=[];
    rows.forEach(function(r){var k=r.item||'(기타·직접추가)';if(!groups[k]){groups[k]=[];order.push(k);}groups[k].push(r);});
    var html='';
    order.forEach(function(k){
      var gr=groups[k],gsup=0;gr.forEach(function(r){gsup+=(r.qty?r.qty*r.price:r.price);});
      html+='<tr class="grp-h"><td class="l" colspan="8">📦 '+k+' <span class="grp-sub">· '+gr.length+'건 · 공급가 '+won(gsup)+'원</span></td></tr>';
      gr.forEach(function(r){html+=rowHTML(r);});
    });
    body.innerHTML=html;
  } else {
    body.innerHTML=rows.map(rowHTML).join('');
  }

  document.getElementById('foot').innerHTML=
    '<div class="fl"><span>공급가액 합계</span><b>'+won(supplyAll)+'원</b></div>'
    +'<div class="fl"><span>부가세 (10%)</span><b>'+won(vat)+'원</b></div>'
    +'<div class="fl grand"><span>합계 금액</span><b>'+won(grand)+'원</b></div>'
    +'<div class="fl paid"><span>✅ 결제완료</span><b>'+won(paidTot)+'원</b></div>'
    +'<div class="fl due"><span>미결제 (미수)</span><b>'+won(dueTot)+'원</b></div>';

  document.getElementById('metrics').innerHTML=
    '<div class="metric"><span class="ml">건수</span><span class="mv tnum">'+rows.length+'</span></div>'
    +'<div class="metric"><span class="ml">공급가액</span><span class="mv tnum">'+won(supplyAll)+'</span></div>'
    +'<div class="metric"><span class="ml">부가세</span><span class="mv tnum">'+won(vat)+'</span></div>'
    +'<div class="metric paid"><span class="ml">결제완료</span><span class="mv tnum">'+won(paidTot)+'</span></div>'
    +'<div class="metric due"><span class="ml">미결제</span><span class="mv tnum">'+won(dueTot)+'</span></div>';
}

function toggleMan(){document.getElementById('man').classList.toggle('open');}
function addMan(){
  var sup=curSup(),name=document.getElementById('m-name').value.trim();
  if(!name){alert('품명을 입력하세요');return;}
  DATA[sup].rows.push({date:document.getElementById('m-date').value||'2026-06-15',trim:name,item:'',brand:window._brand,
    spec:document.getElementById('m-spec').value||'-',qty:+document.getElementById('m-qty').value||1,unit:'건',
    price:+document.getElementById('m-price').value||0,src:'man',paid:false});
  document.getElementById('m-name').value='';document.getElementById('m-spec').value='';document.getElementById('m-qty').value='';document.getElementById('m-price').value='';
  render();document.getElementById('man').classList.add('open');
}
function delMan(i){DATA[curSup()].rows.splice(i,1);render();}

function setTheme(t){document.documentElement.setAttribute('data-theme',t);document.getElementById('t-min').classList.toggle('on',t==='minimal');document.getElementById('t-ret').classList.toggle('on',t==='retro');}
function setW(p){document.body.classList.toggle('phone',p);document.getElementById('w-p').classList.toggle('on',p);document.getElementById('w-d').classList.toggle('on',!p);}

setPreset('m'); // 기본 = 이번 달
</script>
</body>
</html>

<!doctype html>
<html lang="ko" data-theme="minimal">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>사이드바 푸터 정돈안 v2 (좌측정렬 · iOS)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/quiple/galmuri/dist/galmuri.css">
<style>
:root{
  /* 기본 = iOS 스타일 */
  --font:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","SF Pro Text","Pretendard Variable",Pretendard,sans-serif;
  --bg:#f3f1ec; --card:#fff; --text:#1c1c1e; --t2:#3c3c43; --t3:#8e8e93;
  --sel-bg:#e9f0ff; --sel-tx:#0b69ff; --ios-gray:#ececed; --green:#34c759;
}
html[data-theme="retro"]{
  --font:'Galmuri11','Pretendard Variable',Pretendard,sans-serif;
  --bg:#EFE8D4; --card:#FFFCF7; --text:#0B0A05; --t2:#3a3528; --t3:#6b6555;
  --sel-bg:#A5E6BA; --sel-tx:#0B0A05; --ios-gray:#fff; --green:#1f9d55;
}
*{box-sizing:border-box}
body{margin:0;background:#cfcabf;font-family:var(--font);color:var(--text);padding:20px 14px 50px;display:flex;flex-direction:column;align-items:center}
.tg{display:flex;border:2px solid #0B0A05;background:#fff;width:max-content;margin:0 auto 18px}
.tg button{font-family:var(--font);border:none;background:#fff;padding:7px 16px;font-size:12px;font-weight:700;cursor:pointer}
.tg button.on{background:#0B0A05;color:#fff}
.cap{font-size:13px;font-weight:800;color:#1f7a4d;margin-bottom:8px}

/* 사이드바 200px */
.side{width:212px;background:var(--bg);display:flex;flex-direction:column;min-height:540px;text-align:left;
  border:2.5px solid #0B0A05;box-shadow:4px 4px 0 #0B0A05}
html[data-theme="minimal"] .side{border:1px solid #e3e0da;border-radius:16px;box-shadow:0 6px 22px rgba(0,0,0,.12)}
.navtop{flex:1;padding:14px 10px}
.brand{font-size:15px;font-weight:800;margin:2px 6px 12px}
.nav-it{font-size:13.5px;color:var(--t2);padding:9px 12px;text-align:left;margin-bottom:2px;cursor:pointer}
html[data-theme="minimal"] .nav-it{border-radius:9px}
.nav-it.on{background:var(--sel-bg);color:var(--sel-tx);font-weight:800}
html[data-theme="retro"] .nav-it.on{box-shadow:inset 3px 0 0 #0B0A05}
.nav-it.dim{color:var(--t3)}

/* ===== 푸터 ===== */
.foot{padding:11px 12px 13px;text-align:left}
html[data-theme="minimal"] .foot{border-top:1px solid #e7e4de}
html[data-theme="retro"] .foot{border-top:2px solid #0B0A05}
.statusbar{display:flex;gap:14px;font-size:11px;color:var(--t2);margin-bottom:11px;font-weight:600}
.statusbar .dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;margin-right:5px;vertical-align:0px}
html[data-theme="retro"] .statusbar .dot{border-radius:0;border:1px solid #0B0A05}
.glab{font-size:11px;font-weight:700;color:var(--t3);margin:0 0 6px 2px}
.recrow{display:flex;align-items:center;gap:8px;margin-bottom:11px}

/* iOS 세그먼트(되돌리기) — minimal */
html[data-theme="minimal"] .seg{display:inline-flex;background:var(--ios-gray);border-radius:9px;padding:2px;gap:0}
html[data-theme="minimal"] .seg .sb{font-family:var(--font);border:none;background:transparent;font-size:15px;color:#1c1c1e;width:34px;height:30px;cursor:pointer;border-radius:7px;display:flex;align-items:center;justify-content:center}
html[data-theme="minimal"] .seg .sb+.sb{box-shadow:inset 1px 0 0 #d6d6da}
html[data-theme="minimal"] .seg .sb:active{background:#fff}
html[data-theme="minimal"] .refresh{font-family:var(--font);font-size:12.5px;font-weight:600;color:#1c1c1e;background:var(--ios-gray);border:none;border-radius:9px;padding:7px 12px;cursor:pointer;margin-left:auto}
html[data-theme="minimal"] .menu{width:100%;font-family:var(--font);font-size:13.5px;font-weight:600;color:#1c1c1e;background:var(--ios-gray);border:none;border-radius:11px;padding:11px 13px;cursor:pointer;display:flex;align-items:center;justify-content:space-between}
html[data-theme="minimal"] .menu .chev{color:#8e8e93;font-size:11px}

/* 레트로 버전 (픽셀, 좌측정렬) */
html[data-theme="retro"] .seg{display:inline-flex;gap:5px}
html[data-theme="retro"] .seg .sb,html[data-theme="retro"] .refresh{font-family:var(--font);font-size:13px;font-weight:700;background:#FFFCF7;border:2px solid #0B0A05;color:#0B0A05;cursor:pointer;box-shadow:2px 2px 0 #0B0A05}
html[data-theme="retro"] .seg .sb{width:34px;height:32px;display:flex;align-items:center;justify-content:center}
html[data-theme="retro"] .refresh{padding:6px 11px;margin-left:auto}
html[data-theme="retro"] .menu{width:100%;font-family:var(--font);font-size:13px;font-weight:800;background:#B0DBF0;border:2px solid #0B0A05;color:#0B0A05;cursor:pointer;box-shadow:2px 2px 0 #0B0A05;padding:10px 12px;display:flex;align-items:center;justify-content:space-between}

.divline{height:1px;background:#e7e4de;margin:0 0 11px}
html[data-theme="retro"] .divline{background:#0B0A05;opacity:.4}
</style>
</head>
<body>
<div class="tg"><button id="m" class="on" onclick="T('minimal')">기본 (iOS)</button><button id="r" onclick="T('retro')">레트로</button></div>
<div class="cap">정돈안 v2 — 좌측 정렬 + 기본은 아이폰 스타일 버튼</div>

<div class="side">
  <div class="navtop">
    <div class="brand">생산관리</div>
    <div class="nav-it on">생산 대시보드</div>
    <div class="nav-it">오더 관리</div>
    <div class="nav-it">결제 관리</div>
    <div class="nav-it dim">단가장</div>
    <div class="nav-it dim">잔량</div>
  </div>
  <div class="foot">
    <div class="statusbar"><span><span class="dot"></span>저장됨</span><span><span class="dot"></span>연동됨</span></div>
    <div class="glab">기록</div>
    <div class="recrow">
      <div class="seg"><button class="sb">←</button><button class="sb">↩</button><button class="sb">↪</button></div>
      <button class="refresh">새로고침</button>
    </div>
    <div class="divline"></div>
    <button class="menu">설정 · 데이터 <span class="chev">▾</span></button>
  </div>
</div>

<script>
function T(t){document.documentElement.setAttribute('data-theme',t);document.getElementById('m').classList.toggle('on',t==='minimal');document.getElementById('r').classList.toggle('on',t==='retro');}
</script>
</body>
</html>

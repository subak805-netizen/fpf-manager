<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>작업지시서 ↔ 도식화 연결 미리보기</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  :root{ --bg:#f0eee9; --card:#fff; --bd:#e7e3dc; --line:#efece6; --text:#23211e; --t2:#6b6760; --t3:#a6a199; --accent:#185FA5; --accent-bg:#eef5fc; --accent-bd:#cfe0f3; }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'Pretendard',-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
  .wrap{max-width:760px;margin:0 auto;padding:24px 18px 60px}
  .doc-h{display:flex;align-items:center;gap:10px;margin-bottom:6px}
  .doc-h h1{font-size:18px;font-weight:600;margin:0}
  .doc-sub{font-size:13px;color:var(--t2);margin:0 0 20px}
  .card{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:18px;margin-bottom:16px}
  .card h2{font-size:14px;font-weight:600;margin:0 0 14px;color:var(--text);display:flex;align-items:center;gap:7px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .slot{border:1px solid var(--bd);border-radius:12px;overflow:hidden;background:#fbfaf8}
  .slot-h{font-size:12px;color:var(--t2);padding:9px 12px;border-bottom:1px solid var(--line);background:#fff;font-weight:500}
  .slot-body{position:relative;height:200px;display:flex;align-items:center;justify-content:center;background:#fbfaf8}
  .slot-body img{max-width:100%;max-height:100%;object-fit:contain}
  .slot-empty{color:var(--t3);font-size:13px;text-align:center}
  .slot-acts{display:flex;gap:8px;padding:10px 12px;border-top:1px solid var(--line);background:#fff}
  .btn{flex:1;height:38px;border:1px solid var(--bd);background:#fff;border-radius:9px;font-size:13px;font-family:inherit;color:var(--text);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px;transition:background .12s,border-color .12s}
  .btn:hover{background:#f5f3ef;border-color:#dbd6cf}
  .btn.accent{color:var(--accent);border-color:var(--accent-bd);background:var(--accent-bg);font-weight:500}
  .btn.accent:hover{background:#e3eefb}
  .badge{display:inline-block;font-size:11px;color:var(--accent);background:var(--accent-bg);border:1px solid var(--accent-bd);border-radius:999px;padding:2px 9px;margin-left:6px}
  .del{position:absolute;top:8px;right:8px;width:24px;height:24px;border-radius:50%;border:none;background:rgba(0,0,0,.55);color:#fff;cursor:pointer;font-size:13px}
  .note{font-size:12px;color:var(--t3);margin-top:14px;line-height:1.7}
  /* 모달 */
  .modal{position:fixed;inset:0;background:rgba(20,18,16,.5);display:none;z-index:100;flex-direction:column}
  .modal.open{display:flex}
  .modal-bar{height:52px;background:var(--card);border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px;padding:0 14px;flex:0 0 52px}
  .modal-bar .ttl{font-size:14px;font-weight:600;flex:1;display:flex;align-items:center;gap:8px}
  .modal-bar .x{height:36px;padding:0 12px;border:1px solid var(--bd);background:#fff;border-radius:9px;cursor:pointer;font-size:13px;font-family:inherit}
  .modal-bar .use{height:36px;padding:0 16px;border:1px solid var(--accent);background:var(--accent);color:#fff;border-radius:9px;cursor:pointer;font-size:13px;font-weight:500;font-family:inherit}
  .modal-body{flex:1;background:#fff}
  .modal-body iframe{width:100%;height:100%;border:0;display:block}
</style>
</head>
<body>
<div class="wrap">
  <div class="doc-h">📋 <h1>작업지시서</h1><span style="font-size:13px;color:var(--t2)">셔츠 · 품번 AR-2401</span></div>
  <p class="doc-sub">연결 미리보기 — 사진 올리기 <b>그대로</b> + <b>✏️ 도식화 그리기</b> 추가 (둘 다 같은 슬롯)</p>

  <div class="card">
    <h2>봉제 <span class="badge">도식화 슬롯</span></h2>
    <div class="grid">
      <div class="slot">
        <div class="slot-h">봉제 도식화 (큰 그림)</div>
        <div class="slot-body" id="sb-sew"><div class="slot-empty">＋ 사진 또는 ✏️ 도식화</div></div>
        <div class="slot-acts">
          <button class="btn" onclick="pickPhoto('sew')">＋ 사진</button>
          <button class="btn accent" onclick="openDraw('sew','봉제 도식화')">✏️ 도식화</button>
        </div>
      </div>
      <div class="slot">
        <div class="slot-h">앞 도식화 (썸네일)</div>
        <div class="slot-body" id="sb-cut"><div class="slot-empty">＋ 사진 또는 ✏️ 도식화</div></div>
        <div class="slot-acts">
          <button class="btn" onclick="pickPhoto('cut')">＋ 사진</button>
          <button class="btn accent" onclick="openDraw('cut','앞 도식화')">✏️ 도식화</button>
        </div>
      </div>
    </div>
    <div class="note">실제 앱에선 ✏️ 도식화로 그려 <b>저장</b>하면 PNG가 이 슬롯에 자동으로 들어가고(Firebase Storage 업로드, 기존 방식 재사용), 사진 올리기도 지금처럼 그대로 돼요. 한 슬롯엔 사진↔도식화 언제든 교체.</div>
  </div>
</div>

<input type="file" id="photo-input" accept="image/*" style="display:none">

<div class="modal" id="modal">
  <div class="modal-bar">
    <div class="ttl">✏️ <span id="modal-ttl">도식화</span></div>
    <button class="x" onclick="closeDraw()">닫기</button>
    <button class="use" onclick="useDrawing()">✓ 이 도식화 사용</button>
  </div>
  <div class="modal-body"><iframe id="draw-frame" title="도식화"></iframe></div>
</div>

<script>
let curSlot=null;
function setSlot(slot,url){
  const el=document.getElementById('sb-'+slot);
  el.innerHTML='<img src="'+url+'"><button class="del" onclick="clearSlot(\''+slot+'\')">×</button>';
}
function clearSlot(slot){ document.getElementById('sb-'+slot).innerHTML='<div class="slot-empty">＋ 사진 또는 ✏️ 도식화</div>'; }
/* 사진 올리기 — 기존 방식 (그대로) */
function pickPhoto(slot){ curSlot=slot; const i=document.getElementById('photo-input'); i.value=''; i.click(); }
document.getElementById('photo-input').addEventListener('change',e=>{ const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=()=>setSlot(curSlot,r.result); r.readAsDataURL(f); });
/* 도식화 그리기 — 앱 안 모달(iframe) */
function openDraw(slot,title){
  curSlot=slot; document.getElementById('modal-ttl').textContent=title+' · 셔츠';
  const f=document.getElementById('draw-frame');
  if(!f.src) f.src='mockup-techsketch.html';
  document.getElementById('modal').classList.add('open');
}
function closeDraw(){ document.getElementById('modal').classList.remove('open'); }
function useDrawing(){
  const f=document.getElementById('draw-frame');
  try{
    const png=f.contentWindow.exportPNG();   // 도식화 → PNG (실제앱: Storage 업로드)
    setSlot(curSlot,png);
    closeDraw();
  }catch(err){ alert('도식화를 불러오는 중이에요. 잠시 후 다시 눌러주세요.'); }
}
</script>
</body>
</html>
